{{define "admin-layout"}}<!doctype html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>carvilon - {{block "title" .}}Admin{{end}}</title>
  <link rel="stylesheet" href="{{asset "/static/admin-tokens.css"}}">
  <link rel="stylesheet" href="{{asset "/static/admin-components.css"}}">
  {{if .AccentColor}}<style>{{printf ":root{ --accent: %s; --color-accent: %s; }" .AccentColor .AccentColor | safeCSS}}</style>{{end}}
  {{block "head-extra" .}}{{end}}
  <style>
    /* Global admin footer — a full-width bar pinned to the bottom, set off
       from the content above by a hairline (+ a faint accent glow). The
       copyright sits at the right. pointer-events:none so it never blocks
       clicks; pages reserve var(--admin-footer-h) at the bottom so content
       is never hidden behind it (the logic editor subtracts it from the
       iframe height instead, via its own .page padding:0 override). */
    .admin-shell { --admin-footer-h: 28px; }
    .admin-shell .page { padding-bottom: calc(var(--space-24, 24px) + var(--admin-footer-h)); }
    .admin-footer {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 150;
      height: var(--admin-footer-h);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px;
      /* near-black so the strip reads as a continuation of the editor's
         dark dock, not a separate bar; one faint hairline is the only
         seam. */
      background: #070809;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-family: var(--font-sans, system-ui, sans-serif);
      font-size: 10.5px; font-weight: 500; letter-spacing: .02em;
      color: #6a7480;
      user-select: none; pointer-events: none;
    }
    .admin-footer .af-dot { color: var(--accent, #3d7bff); margin: 0 7px; opacity: .85; }
    .admin-footer .af-org { color: #9aa3ae; font-weight: 600; letter-spacing: .03em; }
  </style>
</head>
<body class="admin-shell">
  {{template "admin-topbar" .}}
  <div class="admin-toast" data-bind="toast" role="status" aria-live="polite"></div>
  <main class="page" role="main">
    {{block "content" .}}{{end}}
  </main>
  <footer class="admin-footer">© Sascha Dämgen <span class="af-dot">·</span> <span class="af-org">IT and More Systems</span></footer>
  <script src="{{asset "/static/interactions.js"}}"></script>
  {{block "scripts" .}}{{end}}
</body>
</html>{{end}}
