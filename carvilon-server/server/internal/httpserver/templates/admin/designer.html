{{define "title"}}Logik-Editor{{end}}

{{define "head-extra"}}
<style>
  /* The editor stage fills the content area FLUSH — no inset, no border, no
     shadow, no surround band (that extra space looked wrong). The only
     flourish is a modest corner radius on the stage; because the stage is
     flush on every edge, the rounding shows only as four soft corners, with
     no gap or band anywhere. The colour behind (= the admin topbar's) peeks
     only at those corner arcs. Scoped to this page. */
  body.admin-shell { background: #0e1013; }
  body.admin-shell .page {
    height: calc(100vh - 58px - var(--admin-footer-h, 28px));
    max-width: none; margin: 0; padding: 0; gap: 0;
    box-sizing: border-box; background: #0e1013;
  }
  body.admin-shell .admin-footer { background: #0e1013; }
  .designer-stage { width: 100%; height: 100%; border-radius: 12px; overflow: hidden; background: #050506; }
  .designer-frame { display: block; width: 100%; height: 100%; border: 0; background: #050506; }
</style>
{{end}}

{{define "content"}}
<!-- The editor is served verbatim from the embedded FS at /a/designer/
     (see handler_admin_designer.go), wrapped in a rounded stage that clips
     it to a card. Demo feeds for now; live engine/SSE wiring is later. -->
<div class="designer-stage">
  <iframe class="designer-frame" src="/a/designer/{{if .Page.GraphID}}?g={{.Page.GraphID}}{{end}}" title="CARVILON Logik-Editor"></iframe>
</div>
{{end}}
