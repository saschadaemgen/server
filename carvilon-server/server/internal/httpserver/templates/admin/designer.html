{{define "title"}}Logik-Editor{{end}}

{{define "head-extra"}}
<style>
  /* The logic editor renders inside the iframe as a rounded card, inset in
     a single uniform surround colour (#14171c). The page background, the
     inset around the card and the footer all share that one colour, so
     there are no stray colour seams — just the deliberate contrast between
     the near-black editor card and its slightly lighter frame, which makes
     the rounded corners read. Scoped to this page only. */
  body.admin-shell { background: #14171c; }
  body.admin-shell .page {
    height: calc(100vh - 58px - var(--admin-footer-h, 28px));
    max-width: none; margin: 0; padding: 14px; gap: 0;
    box-sizing: border-box; background: #14171c;
  }
  body.admin-shell .admin-footer { background: #14171c; } /* same surround → no colour diff */
  .designer-stage {
    width: 100%; height: 100%;
    border-radius: 14px; overflow: hidden;            /* clips the iframe to a rounded card */
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
    background: #050506;
  }
  .designer-frame { display: block; width: 100%; height: 100%; border: 0; background: #050506; }
</style>
{{end}}

{{define "content"}}
<!-- The editor is served verbatim from the embedded FS at /a/designer/
     (see handler_admin_designer.go), wrapped in a rounded stage that clips
     it to a card. Demo feeds for now; live engine/SSE wiring is later. -->
<div class="designer-stage">
  <iframe class="designer-frame" src="/a/designer/" title="CARVILON Logik-Editor"></iframe>
</div>
{{end}}
