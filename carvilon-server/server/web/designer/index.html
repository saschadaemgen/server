<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CARVILON · Logik-Editor</title>
<link href="./vendor/fonts.css" rel="stylesheet" />
<link href="./css/editor.css" rel="stylesheet" />
</head>
<body class="signals-on">
<canvas id="bg"></canvas>
<div class="vignette"></div>
<div class="scanline"></div>

<header class="topbar">
  <div class="crumb"><span class="crumb-title">Logic Editor</span><span style="color:var(--faint)">/</span><button class="chip crumb-btn" id="crumb-btn" title="Projektbaum öffnen"><span class="dot"></span><span id="crumb-text">…</span><i data-lucide="chevron-down" class="crumb-chev"></i></button></div>
  <div class="spacer"></div>
  <div class="tools">
    <div class="tbtn toggle on" id="btn-signal"><span>Signal Flow</span><span class="tsw"><i></i></span></div>
    <div class="tbtn icon active" id="btn-snap" title="Snap to grid"><i data-lucide="magnet"></i></div>
    <div class="tbtn icon active" id="btn-grid" title="Show grid"><i data-lucide="grid-3x3"></i></div>
    <div class="tbtn icon" id="btn-fx" title="Einstellungen"><i data-lucide="settings"></i></div>
    <div class="sep"></div>
    <div class="tbtn" id="btn-run" title="Run the graph in the engine"><i data-lucide="play" class="lead"></i>Run</div>
  </div>
</header>

<div class="rtools" id="rtools">
  <button class="rt-tool active" data-tool="select" title="Select tool (V)"><i data-lucide="mouse-pointer-2"></i></button>
  <button class="rt-tool" data-tool="hand" title="Move tool (H)"><i data-lucide="hand"></i></button>
  <div class="rt-sep"></div>
  <div class="rt-lbl">Align</div>
  <button class="rt-act" data-al="left" title="Align left"><i data-lucide="align-start-vertical"></i></button>
  <button class="rt-act" data-al="hcenter" title="Align center horizontal"><i data-lucide="align-center-vertical"></i></button>
  <button class="rt-act" data-al="right" title="Align right"><i data-lucide="align-end-vertical"></i></button>
  <button class="rt-act" data-al="top" title="Align top"><i data-lucide="align-start-horizontal"></i></button>
  <button class="rt-act" data-al="vcenter" title="Align center vertical"><i data-lucide="align-center-horizontal"></i></button>
  <button class="rt-act" data-al="bottom" title="Align bottom"><i data-lucide="align-end-horizontal"></i></button>
  <div class="rt-sep"></div>
  <div class="rt-lbl">Dist</div>
  <button class="rt-act" data-al="dh" title="Distribute horizontally"><i data-lucide="align-horizontal-distribute-center"></i></button>
  <button class="rt-act" data-al="dv" title="Distribute vertically"><i data-lucide="align-vertical-distribute-center"></i></button>
  <div class="rt-sep"></div>
  <div class="rt-lbl">Zoom</div>
  <button class="rt-act" id="rz-in" title="Zoom in"><i data-lucide="plus"></i></button>
  <button class="rt-act" id="rz-fit" title="Fit"><i data-lucide="maximize"></i></button>
  <button class="rt-act" id="rz-out" title="Zoom out"><i data-lucide="minus"></i></button>
  <div class="rt-zval" id="rt-zval">100%</div>
</div>

<aside class="rail">
  <div class="search"><i data-lucide="search"></i><span class="search-ph">Search blocks <span class="search-cnt"></span>…</span><button class="filter-btn" id="filter-btn" title="Filter categories"><i data-lucide="sliders-horizontal"></i></button></div>
  <div class="filter-pop" id="filter-pop"></div>
  <div class="lib" id="lib"></div>
</aside>

<!-- Projektbaum-Popover, verankert unter der Kopfzeile (öffnet über den
     Brotkrumen-Knopf; Inhalt rendert project.js) -->
<div class="proj-pop" id="proj-pop"></div>

<aside class="inspector" id="inspector">
  <div class="insp-head"><span class="insp-cat" id="insp-cat">—</span>
    <div style="display:flex;gap:6px">
      <button class="insp-close" id="insp-del" title="Delete module"><i data-lucide="trash-2"></i></button>
      <button class="insp-close" id="insp-close" title="Close"><i data-lucide="x"></i></button>
    </div>
  </div>
  <input class="insp-title" id="insp-title" />
  <div class="insp-sec"><label>Card color</label><div class="swatches" id="insp-colors"></div></div>
  <div class="insp-sec"><label>Properties</label><div id="insp-props"></div></div>
  <div class="insp-sec" id="insp-wires-sec"><label>Wires</label><div id="insp-wires"></div></div>
</aside>

<div id="viewport">
  <div id="world"><svg id="wires"><defs></defs></svg></div>
  <div id="marquee"></div>
  <div class="canvas-loading" id="canvas-loading">Lädt…</div>
</div>
<div id="dragghost"></div>
<button id="wire-del" title="Disconnect wire"><i data-lucide="scissors"></i></button>
<div class="sysclock"><div class="ck-time" id="ck-time">00:00:00</div></div>
<div class="dock" id="dock">
  <div class="dock-bar">
    <div class="dock-tabs">
      <button class="dock-tab active" data-tab="ssh" title="Doppelklick: nebeneinander aufteilen (bis 4×)"><span class="led"></span>SSH Terminal</button>
      <button class="dock-tab" data-tab="mqtt" title="MQTT-Konsole (Broker-Client)"><i data-lucide="radio"></i>MQTT</button>
      <button class="dock-tab" data-tab="tcp" title="Doppelklick: nebeneinander aufteilen (bis 4×)"><i data-lucide="network"></i>TCP</button>
      <button class="dock-tab" data-tab="udp" title="Doppelklick: nebeneinander aufteilen (bis 4×)"><i data-lucide="radio-tower"></i>UDP</button>
      <button class="dock-tab" data-tab="sys" title="Server-Journal (live)"><i data-lucide="scroll-text"></i>System Log</button>
      <button class="dock-tab" data-tab="engine" title="Engine-Ereignisse (Build, Run, Ticks)"><i data-lucide="cpu"></i>Engine</button>
    </div>
    <div class="dock-spacer"></div>
    <div class="dock-status">
      <span class="st"><span class="dot"></span><span id="st-host">Host …</span></span>
      <span class="st">Nodes <b id="st-nodes">–</b></span>
      <span class="st" id="st-save">rev <b>–</b></span>
      <span class="st mono" id="st-clock">00:00:00</span>
    </div>
    <button class="dock-toggle" id="dock-toggle" title="Collapse panel"><i data-lucide="chevron-down"></i></button>
  </div>
  <div class="dock-body" id="dock-body">
    <div class="term active" data-pane="ssh" id="term-ssh"></div>
    <div class="term" data-pane="mqtt" id="term-mqtt"></div>
    <div class="term" data-pane="tcp" id="term-tcp"></div>
    <div class="term" data-pane="udp" id="term-udp"></div>
    <div class="term" data-pane="sys" id="term-sys"></div>
    <div class="term" data-pane="engine" id="term-engine"></div>
  </div>
</div>

<div class="minimap" id="minimap"><span class="mm-label">Overview</span>
  <svg class="mm-svg" id="mm-svg"><g id="mm-edges"></g><g id="mm-nodes"></g></svg>
  <div class="mm-vp" id="mm-vp"></div>
</div>
<!-- zoom moved into right toolbar -->

<div class="hint"><b>Drag nodes</b> · Shift-click to multi-select · Shift-drag to box-select <kbd>Scroll</kbd> Zoom</div>
<script src="./vendor/lucide.min.js"></script>
<script type="module" src="./js/main.js"></script>
</body>
</html>
