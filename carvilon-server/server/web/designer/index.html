<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CARVILON · Logik-Editor</title>
<link href="./vendor/fonts.css" rel="stylesheet" />
<style>
:root{
  --bg-0:#050506;--bg-1:#0A0B0D;
  --cyan:#34E4EA;--cyan-bright:#A6F8FB;--cyan-dim:#198E97;
  --cat-input:#2DD4EF;--cat-logic:#A78BFA;--cat-time:#F6B23C;--cat-memory:#5B9DFF;--cat-output:#43E08A;
  --text:#EAF1F5;--muted:#8A97A6;--faint:#52606E;
  --panel:rgba(18,20,23,0.78);--panel-2:rgba(11,12,14,0.74);
  --border:rgba(120,150,180,0.12);--border-bright:rgba(150,200,235,0.32);
  --accent:#3B82F6;--accent-dim:#2563EB;--ok:#22C55E;
  --wire:#3B82F6;--wire-soft:rgba(59,130,246,.5);
  --rail-w:236px;--insp-w:296px;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;-moz-user-select:none;
  background:
    radial-gradient(960px 600px at 60% 24%, rgba(22,46,52,0.38) 0%, rgba(22,46,52,0) 62%),
    radial-gradient(820px 560px at 14% 90%, rgba(16,26,40,0.30) 0%, transparent 58%),
    linear-gradient(180deg,#08090B 0%, var(--bg-0) 100%);}

#bg{position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block}
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(128% 128% at 50% 40%, rgba(5,5,6,0) 44%, rgba(3,3,4,0.74) 100%);}
.scanline{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.4;mix-blend-mode:overlay;
  background:repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, rgba(0,0,0,0) 1px 3px);}

#viewport{position:fixed;inset:0;z-index:2;overflow:hidden;cursor:grab;touch-action:none}
#viewport.panning{cursor:grabbing}
#world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
#wires{position:absolute;left:0;top:0;width:10px;height:10px;overflow:visible;pointer-events:none}

/* marquee */
#marquee{position:absolute;z-index:5;border:1px solid rgba(52,228,234,.7);background:rgba(52,228,234,.08);border-radius:3px;pointer-events:none;display:none}

/* wires */
.wire{filter:drop-shadow(0 0 2px var(--wire-soft)) drop-shadow(0 0 8px var(--wire-soft));}
.wire-base{fill:none;stroke:var(--wire);stroke-width:2.4;stroke-linecap:round;}
.wire-flow{fill:none;stroke:#EAFEFF;stroke-width:2.1;stroke-linecap:round;stroke-dasharray:1 13;opacity:0;}
body.signals-on .wire-flow{opacity:.5;animation:flow 2.6s linear infinite}
.spark{filter:drop-shadow(0 0 4px rgba(166,248,251,.95)) drop-shadow(0 0 9px var(--wire-soft))}
.pulse{filter:drop-shadow(0 0 6px #fff) drop-shadow(0 0 14px var(--wire))}
@keyframes flow{to{stroke-dashoffset:-28}}

/* nodes */
.node{position:absolute;width:214px;border-radius:15px;cursor:grab;
  background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);border:1px solid var(--border);
  box-shadow:0 20px 44px -18px rgba(0,0,0,.85), 0 2px 8px -2px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05);
  backdrop-filter:blur(14px) saturate(1.2);-webkit-backdrop-filter:blur(14px) saturate(1.2);
  transition:box-shadow .25s ease, border-color .25s ease;}
.node:hover{border-color:var(--border-bright);box-shadow:0 24px 56px -18px rgba(0,0,0,.9), 0 0 26px -6px var(--cat), inset 0 1px 0 rgba(255,255,255,.07);}
.node.dragging{cursor:grabbing;transition:none;box-shadow:0 34px 70px -20px rgba(0,0,0,.95), 0 0 40px -6px var(--cat);}
.node.selected{border-color:color-mix(in srgb,var(--cat) 60%,transparent);
  box-shadow:0 24px 56px -18px rgba(0,0,0,.9), 0 0 0 1.5px color-mix(in srgb,var(--cat) 55%,transparent), 0 0 32px -6px var(--cat);}
.node.lit{box-shadow:0 24px 56px -18px rgba(0,0,0,.9), 0 0 0 1px color-mix(in srgb,var(--cat) 50%,transparent), 0 0 46px -4px var(--cat);}
.node-accent{position:absolute;left:13px;right:13px;top:0;height:2px;border-radius:0 0 3px 3px;background:linear-gradient(90deg, transparent, var(--cat), transparent);opacity:.6}
.node-head{display:flex;align-items:center;gap:11px;padding:13px 14px 10px}
.node-icon{flex:none;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--cat);
  background:radial-gradient(120% 120% at 30% 20%, color-mix(in srgb, var(--cat) 26%, transparent), color-mix(in srgb, var(--cat) 6%, transparent));
  border:1px solid color-mix(in srgb, var(--cat) 34%, transparent);box-shadow:0 0 7px -4px var(--cat), inset 0 0 9px -7px var(--cat);transition:.25s}
.node.lit .node-icon{box-shadow:0 0 13px -4px var(--cat), inset 0 0 10px -6px var(--cat)}
.node::before{content:"";position:absolute;inset:0;border-radius:15px;pointer-events:none;z-index:0;overflow:hidden;background:radial-gradient(58% 72% at 14% 4%, color-mix(in srgb,var(--cat) 16%,transparent), transparent 50%)}
.node-head,.node-body{position:relative;z-index:1}
.node-accent,.ports{z-index:1}
.node-icon svg{width:18px;height:18px;stroke-width:2}
.node-titles{min-width:0}
.node-cat{font:600 9.5px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--cat);opacity:.92;margin-bottom:4px}
.node-title{font:600 13.5px/1.15 var(--font);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-body{padding:11px 14px 13px;border-top:1px solid rgba(255,255,255,.05);margin-top:2px}
.prow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.prow + .prow{margin-top:7px}
.pk{font:500 11px/1 var(--font);color:var(--muted)}
.pv{font:600 11.5px/1 var(--mono);color:var(--text);white-space:nowrap;background:rgba(120,150,180,.08);border:1px solid rgba(120,150,180,.12);padding:4px 7px;border-radius:6px}
.pv.accent{color:var(--cat);border-color:color-mix(in srgb,var(--cat) 30%,transparent);background:color-mix(in srgb,var(--cat) 11%,transparent)}

/* on-card controls */
.node-ctl{margin-top:11px;padding-top:11px;border-top:1px solid rgba(255,255,255,.05)}
.ctl-press{width:100%;height:34px;border-radius:9px;border:1px solid color-mix(in srgb,var(--cat) 40%,transparent);cursor:pointer;
  background:color-mix(in srgb,var(--cat) 14%,transparent);color:var(--text);font:600 12px/1 var(--font);
  display:flex;align-items:center;justify-content:center;gap:7px;transition:.12s;-webkit-tap-highlight-color:transparent}
.ctl-press:hover{background:color-mix(in srgb,var(--cat) 22%,transparent)}
.ctl-press:active{transform:scale(.97);box-shadow:0 0 22px -4px var(--cat)}
.ctl-press svg{width:14px;height:14px}
.ctl-switch{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
.ctl-switch .swlab{font:500 11px/1 var(--font);color:var(--muted)}
.sw-track{width:42px;height:23px;border-radius:999px;background:rgba(120,150,180,.16);border:1px solid var(--border);position:relative;transition:.2s;flex:none}
.sw-thumb{position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#cfd8e2;transition:.2s}
.node-ctl.on .sw-track{background:color-mix(in srgb,var(--cat) 60%,transparent);border-color:transparent}
.node-ctl.on .sw-thumb{left:21px;background:#fff;box-shadow:0 0 10px var(--cat)}
.node-ctl.on .swlab{color:var(--cat)}
.ctl-slider{display:flex;flex-direction:column;gap:8px}
.ctl-slider .slhead{display:flex;align-items:center;justify-content:space-between}
.ctl-slider .slhead .k{font:500 11px/1 var(--font);color:var(--muted)}
.ctl-slider .slhead .v{font:600 11.5px/1 var(--mono);color:var(--cat)}
.ctl-slider input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:99px;background:rgba(120,150,180,.18);outline:none;cursor:pointer}
.ctl-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--cat);box-shadow:0 0 10px -1px var(--cat);cursor:pointer;border:2px solid #0b0c0e}
.ctl-slider input[type=range]::-moz-range-thumb{width:15px;height:15px;border:2px solid #0b0c0e;border-radius:50%;background:var(--cat);box-shadow:0 0 10px -1px var(--cat);cursor:pointer}
.ctl-prog{height:3px;border-radius:99px;background:rgba(120,150,180,.14);overflow:hidden;margin-top:2px}
.ctl-prog>i{display:block;height:100%;width:0;background:var(--cat);box-shadow:0 0 8px var(--cat)}

/* ports + tooltip */
.ports{position:absolute;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;gap:14px}
.ports-in{left:-7px}.ports-out{right:-7px}
.port{position:relative}
.socket{width:15px;height:15px;border-radius:50%;display:block;
  background:radial-gradient(circle at 50% 50%, #07100f 0 32%, var(--wire) 37% 62%, color-mix(in srgb,var(--wire) 14%,transparent) 65%);
  border:1px solid color-mix(in srgb,var(--wire) 65%,transparent);box-shadow:0 0 8px -1px var(--wire-soft), inset 0 0 4px rgba(0,0,0,.6);transition:box-shadow .2s}
.node:hover .socket{box-shadow:0 0 13px 0 var(--wire), inset 0 0 4px rgba(0,0,0,.6)}
.port::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%) translateY(4px);
  font:500 9px/1 var(--mono);letter-spacing:.06em;color:var(--cyan-bright);background:rgba(8,12,16,.92);border:1px solid var(--border);
  padding:4px 6px;border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none;transition:.15s;text-transform:uppercase}
.port:hover::after{opacity:1;transform:translateX(-50%) translateY(0)}

/* top bar */
.topbar{position:fixed;top:0;left:0;right:0;height:54px;z-index:20;display:flex;align-items:center;gap:14px;padding:0 16px;
  background:rgba(11,12,15,.93);border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}
.crumb-title{color:var(--text);font-weight:600;font-size:13px}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.02em;font-size:15px}
.brand .mark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:linear-gradient(150deg, var(--cyan), var(--cyan-dim));box-shadow:0 0 14px -2px rgba(52,228,234,.8), inset 0 1px 0 rgba(255,255,255,.4);color:#03100f}
.brand .mark svg{width:13px;height:13px;stroke-width:2.6}
.sep{width:1px;height:22px;background:var(--border)}
.crumb{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted)}
.crumb .chip{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:8px;background:rgba(120,150,180,.07);border:1px solid var(--border);color:var(--text);font-weight:500}
.crumb .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--cat-time);box-shadow:0 0 8px var(--cat-time)}
.spacer{flex:1}
.tools{display:flex;align-items:center;gap:8px}
.tbtn{height:34px;display:flex;align-items:center;gap:9px;padding:0 12px;border-radius:9px;background:#15171d;border:1px solid #272b35;color:#c7ced9;font:500 12.5px/1 var(--font);cursor:pointer;transition:.15s;user-select:none}
.tbtn svg{width:15px;height:15px}
.tbtn:hover{background:#1b1e26;border-color:#323743;color:#fff}
.tbtn .lead{color:var(--accent)}
.tbtn.icon{padding:0;width:34px;justify-content:center;color:var(--muted)}
.tbtn.icon.active{background:rgba(59,130,246,.14);border-color:rgba(59,130,246,.5)}
.tbtn.icon.active svg{color:var(--accent)}
.tbtn.ghost{opacity:.6;cursor:not-allowed}
.tbtn.ghost svg{color:var(--accent)}
.tsw{width:30px;height:17px;border-radius:99px;background:#2a2f3a;position:relative;transition:.2s;flex:none}
.tsw i{position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#cfd6e0;transition:.2s;display:block}
.tbtn.toggle.on .tsw{background:var(--accent)}
.tbtn.toggle.on .tsw i{left:15px;background:#fff}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(150deg,#23303d,#12181f);border:1px solid var(--border-bright);display:grid;place-items:center;font:600 11px var(--mono);color:var(--cyan-bright)}

/* align toolbar */
.alignbar{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:18;display:none;align-items:center;gap:4px;
  padding:6px;border-radius:12px;background:var(--panel);border:1px solid var(--border-bright);backdrop-filter:blur(16px);
  box-shadow:0 16px 40px -16px rgba(0,0,0,.8);opacity:0;transition:.18s}
.alignbar.show{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
.alignbar .ab-label{font:600 9.5px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:0 8px 0 6px}
.alignbar button{width:32px;height:32px;border:none;background:transparent;color:var(--muted);border-radius:8px;cursor:pointer;display:grid;place-items:center;transition:.13s}
.alignbar button:hover{background:rgba(120,150,180,.12);color:var(--cyan-bright)}
.alignbar button svg{width:16px;height:16px}
.ab-sep{width:1px;height:18px;background:var(--border);margin:0 3px}
.rtools{position:fixed;top:54px;right:0;bottom:0;width:54px;z-index:19;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 14px;background:linear-gradient(180deg, rgba(8,9,11,.78), rgba(6,7,9,.6));border-left:1px solid var(--border);backdrop-filter:blur(14px);overflow-y:auto}
.rtools::-webkit-scrollbar{width:0}
.rt-tool,.rt-act{width:32px;height:32px;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:8px;display:grid;place-items:center;cursor:pointer;transition:.12s;flex:none}
.rt-tool:hover,.rt-act:hover{background:rgba(120,150,180,.12);color:var(--text)}
.rt-act:active{transform:scale(.9)}
.rt-tool svg,.rt-act svg{width:16px;height:16px}
.rt-tool.active{background:var(--accent);color:#fff;box-shadow:0 0 14px -3px rgba(59,130,246,.7)}
.rt-sep{width:22px;height:1px;background:var(--border);margin:3px 0;flex:none}
.rt-lbl{font:600 7px/1 var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin:1px 0}
.rt-zval{font:600 9.5px/1 var(--mono);color:var(--muted);margin-top:2px}

/* left rail */
.rail{position:fixed;top:54px;left:0;bottom:0;width:var(--rail-w);z-index:15;background:linear-gradient(180deg, rgba(8,9,11,.78), rgba(6,7,9,.6));border-right:1px solid var(--border);backdrop-filter:blur(14px);display:flex;flex-direction:column}
.rail-head{padding:10px 12px 8px}
.proj-btn{width:100%;display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;background:rgba(120,150,180,.05);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:.12s}
.proj-btn:hover{background:rgba(120,150,180,.1);border-color:var(--border-bright)}
.proj-btn:focus,.proj-btn:focus-visible,.dock-tab:focus,.rt-act:focus,.rt-tool:focus,.tbtn:focus,.pt-actions button:focus{outline:none}
.rail ::-webkit-scrollbar,.dock ::-webkit-scrollbar,.inspector::-webkit-scrollbar,.proj-pop ::-webkit-scrollbar,.term::-webkit-scrollbar{width:9px;height:9px}
.rail ::-webkit-scrollbar-thumb,.dock ::-webkit-scrollbar-thumb,.inspector::-webkit-scrollbar-thumb,.proj-pop ::-webkit-scrollbar-thumb,.term::-webkit-scrollbar-thumb{background:rgba(120,150,180,.22);border-radius:5px}
.rail ::-webkit-scrollbar-thumb:hover,.proj-pop ::-webkit-scrollbar-thumb:hover{background:rgba(120,150,180,.34)}
.rail ::-webkit-scrollbar-track,.dock ::-webkit-scrollbar-track,.inspector::-webkit-scrollbar-track,.proj-pop ::-webkit-scrollbar-track,.term::-webkit-scrollbar-track{background:transparent}
.dock ::-webkit-scrollbar-thumb,.term::-webkit-scrollbar-thumb{background:#23272f}
.dock ::-webkit-scrollbar-thumb:hover,.term::-webkit-scrollbar-thumb:hover{background:#2f343d}
.dock ::-webkit-scrollbar-corner,.term::-webkit-scrollbar-corner{background:transparent}
.proj-ic{width:15px;height:15px;color:var(--muted);flex:none}
.proj-cur{flex:1;text-align:left;font:600 12.5px/1 var(--font);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-chev{width:14px;height:14px;color:var(--faint);transition:transform .18s;flex:none}
.rail.proj-open .proj-chev{transform:rotate(180deg)}
.proj-pop{display:none;margin:0 12px 8px;border-radius:9px;background:#15171c;border:1px solid var(--border-bright);box-shadow:0 18px 40px -14px rgba(0,0,0,.85);overflow:hidden}
.rail.proj-open .proj-pop{display:block}
.pt-tree{max-height:240px;overflow:auto;padding:6px}
.pt-row{display:flex;align-items:center;gap:8px;padding:6px 8px;padding-left:calc(8px + var(--d,0)*13px);border-radius:6px;cursor:pointer;font:500 12px/1 var(--font);color:var(--muted)}
.pt-row:hover{background:rgba(120,150,180,.08);color:var(--text)}
.pt-row svg{width:14px;height:14px;flex:none}
.pt-row span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-proj.cur{color:#fff;background:rgba(120,150,180,.07)}
.pt-proj.cur .pt-dot{color:var(--ok);width:13px;height:13px}
.pt-chev{transition:transform .15s}
.pt-folder[data-open="true"]>.pt-fold .pt-chev{transform:rotate(90deg)}
.pt-actions{display:flex;gap:2px;padding:6px;border-top:1px solid var(--border)}
.pt-actions button{flex:1;height:30px;border:none;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;display:grid;place-items:center}
.pt-actions button:hover{background:rgba(120,150,180,.1);color:var(--text)}
.pt-actions button svg{width:15px;height:15px}
.rail-head h2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600}
.rail-head .cnt{font:500 10px/1 var(--mono);color:var(--faint);padding:3px 6px;border-radius:5px;border:1px solid var(--border)}
.search{margin:0 0 8px;display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:0;background:rgba(0,0,0,.3);border:0;border-bottom:1px solid var(--border);color:var(--faint);font-size:12.5px}
.search .search-ph{flex:1}
.filter-btn{width:27px;height:27px;border-radius:4px;border:1px solid var(--border);background:rgba(120,150,180,.06);color:var(--muted);display:grid;place-items:center;cursor:pointer;transition:.13s;flex:none}
.filter-btn:hover{color:var(--text);border-color:var(--border-bright)}
.filter-btn.active{color:#fff;background:var(--accent);border-color:transparent}
.filter-btn svg{width:14px;height:14px}
.filter-pop{position:absolute;top:72px;left:14px;right:14px;z-index:30;padding:7px;border-radius:11px;background:#15171c;border:1px solid var(--border-bright);box-shadow:0 18px 40px -14px rgba(0,0,0,.85);display:none;flex-direction:column;gap:2px}
.filter-pop.show{display:flex}
.filter-head{display:flex;align-items:center;justify-content:space-between;padding:3px 8px 6px}
.filter-head span{font:600 9.5px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
.filter-head button{background:none;border:none;color:var(--accent);font:600 10.5px/1 var(--font);cursor:pointer}
.fp-row{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:.12s}
.fp-row:hover{background:rgba(120,150,180,.08)}
.fp-dot{width:10px;height:10px;border-radius:3px;background:var(--c);box-shadow:0 0 8px -1px var(--c);flex:none}
.fp-name{flex:1;font:500 12.5px/1 var(--font);color:var(--text)}
.fp-check{width:17px;height:17px;border-radius:5px;border:1px solid var(--border);display:grid;place-items:center;color:transparent;flex:none}
.fp-row.on .fp-check{background:var(--accent);border-color:transparent;color:#fff}
.fp-check svg{width:11px;height:11px}
.lib-glabel .gd{cursor:pointer}
.lib-glabel .gd:hover{transform:scale(1.3);box-shadow:0 0 11px 0 var(--gc)}
.cat-pop{position:fixed;z-index:40;display:none;gap:8px;flex-wrap:wrap;max-width:142px;padding:9px;border-radius:11px;background:#15171c;border:1px solid var(--border-bright);box-shadow:0 18px 40px -14px rgba(0,0,0,.85)}
.cat-pop.show{display:flex}
.search svg{width:14px;height:14px;color:var(--faint)}
.lib{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 8px 14px}
.lib::-webkit-scrollbar{width:8px}.lib::-webkit-scrollbar-thumb{background:rgba(120,150,180,.18);border-radius:4px}.lib::-webkit-scrollbar-track{background:transparent}
.lib-group{border-top:1px solid rgba(255,255,255,.06)}
.lib-group:first-child{border-top:none}
.lib-glabel{display:flex;align-items:center;gap:8px;padding:9px 8px 8px;cursor:pointer;user-select:none}

let curProj='EG \u00b7 Flur';
const railEl=document.querySelector('.rail'),projPop=document.getElementById('proj-pop'),projBtn=document.getElementById('proj-btn'),projCur=document.getElementById('proj-cur');
function findNode(id,ns,parent){for(const n of ns){if(n._id===id)return{n,parent:ns};if(n.children){const r=findNode(id,n.children,n);if(r)return r;}}return null;}
function renderTree(ns,d){return ns.map(n=>n.type==='folder'?`<div class=\"pt-folder\" data-open=\"${n.open}\"><div class=\"pt-row pt-fold\" data-id=\"${n._id}\" style=\"--d:${d}\"><i class=\"pt-chev\" data-lucide=\"chevron-right\"></i><i data-lucide=\"folder\"></i><span>${n.name}</span></div><div class=\"pt-children\">${n.open?renderTree(n.children,d+1):''}</div></div>`:`<div class=\"pt-row pt-proj${n.name===curProj?' cur':''}\" data-proj=\"${n.name}\" style=\"--d:${d}\"><i data-lucide=\"file\"></i><span>${n.name}</span>${n.name===curProj?'<i class=\"pt-dot\" data-lucide=\"check\"></i>':''}</div>`).join('');}
function paintProj(){projPop.innerHTML=`<div class=\"pt-tree\">${renderTree(PROJ,0)}</div><div class=\"pt-actions\"><button data-act=\"newp\" title=\"New project\"><i data-lucide=\"file-plus\"></i></button><button data-act=\"newf\" title=\"New folder\"><i data-lucide=\"folder-plus\"></i></button><button data-act=\"ren\" title=\"Rename\"><i data-lucide=\"pencil\"></i></button><button data-act=\"del\" title=\"Delete\"><i data-lucide=\"trash-2\"></i></button></div>`;if(window.lucide)lucide.createIcons();}
function curParent(ns){for(const n of ns){if(n.type==='proj'&&n.name===curProj)return ns;if(n.children){const r=curParent(n.children);if(r)return r;}}return null;}
function setCurrent(name){curProj=name;projCur.textContent=name;railEl.classList.remove('proj-open');paintProj();}
paintProj();
projBtn.onclick=e=>{e.stopPropagation();railEl.classList.toggle('proj-open');};
document.addEventListener('pointerdown',e=>{if(!e.target.closest('.rail-head')&&!e.target.closest('#proj-pop'))railEl.classList.remove('proj-open');});
projPop.addEventListener('click',e=>{
  const fold=e.target.closest('.pt-fold');if(fold){const r=findNode(fold.dataset.id,PROJ);if(r){r.n.open=!r.n.open;paintProj();}return;}
  const pr=e.target.closest('.pt-proj');if(pr){setCurrent(pr.dataset.proj);return;}
  const act=e.target.closest('[data-act]');if(!act)return;const a=act.dataset.act;
  if(a==='newp'){const nm=prompt('New project name');if(nm){(curParent(PROJ)||PROJ[0].children).push({type:'proj',name:nm,_id:'p'+(++_pid)});setCurrent(nm);}}
  else if(a==='newf'){const nm=prompt('New folder name');if(nm){PROJ.push({type:'folder',name:nm,open:true,children:[],_id:'p'+(++_pid)});paintProj();}}
  else if(a==='ren'){const nm=prompt('Rename project',curProj);if(nm){const p=curParent(PROJ);if(p){const it=p.find(x=>x.name===curProj);if(it)it.name=nm;}setCurrent(nm);}}
  else if(a==='del'){const p=curParent(PROJ);if(p){const i=p.findIndex(x=>x.name===curProj);if(i>=0)p.splice(i,1);}let first=null;(function f(ns){for(const n of ns){if(n.type==='proj'&&!first)first=n.name;if(n.children)f(n.children);}})(PROJ);setCurrent(first||'\u2014');}
});
function openCatColor(cat,anchor){let pop=document.getElementById('cat-pop');if(!pop){pop=document.createElement('div');pop.id='cat-pop';pop.className='cat-pop';document.body.appendChild(pop);}pop.innerHTML='';
  PALETTE.forEach(col=>{const s=document.createElement('div');s.className='sw'+(col===CAT[cat].color?' sel':'');s.style.background=col;s.style.setProperty('--swc',col);s.onclick=()=>{setCategoryColor(cat,col);pop.remove();};pop.appendChild(s);});
  const r=anchor.getBoundingClientRect();pop.style.left=r.left+'px';pop.style.top=(r.bottom+6)+'px';pop.classList.add('show');
  setTimeout(()=>document.addEventListener('pointerdown',function h(e){if(!e.target.closest('#cat-pop')){pop.remove();document.removeEventListener('pointerdown',h);}}),0);}
function setCategoryColor(cat,col){CAT[cat].color=col;
  document.querySelectorAll(`.lib-group[data-cat="${cat}"] .gd`).forEach(d=>d.style.setProperty('--gc',col));
  document.querySelectorAll(`.lib-item[data-cat="${cat}"]`).forEach(it=>it.style.setProperty('--gc',col));
  for(const id in nodes){if(nodes[id].def.cat===cat){nodes[id].def.color=col;nodes[id].el.style.setProperty('--cat',col);}}
  const fp=document.querySelector(`#filter-pop .fp-row[data-cat="${cat}"]`);if(fp)fp.style.setProperty('--c',col);
  if(typeof renderMinimap==='function')renderMinimap();}
const FAV_DEFAULT=['Push-button','Switch','Motion sensor','AND','OR','Staircase light','Timer','Lamp','Relay','Dimmer'];
const favorites=FAV_DEFAULT.filter(n=>NAME_CAT[n]);
const favSec=document.createElement('div');favSec.className='fav-sec';favSec.innerHTML='<div class="fav-row" id="fav-row"></div>';

function renderFavorites(){favRow.innerHTML='';favorites.forEach(name=>{const cat=NAME_CAT[name];if(!cat)return;const it=document.createElement('div');it.className='fav-item';it.dataset.name=name;it.dataset.cat=cat;it.style.setProperty('--gc',CAT[cat].color);it.title=name+' · hold to remove';
  it.innerHTML=`<i data-lucide="${NAME_ICON[name]||CAT[cat].icon}"></i>`;
  favRow.appendChild(it);attachFav(it);});

function addFavorite(name){if(!name||favorites.includes(name))return;favorites.unshift(name);if(favorites.length>14)favorites.pop();renderFavorites();}

function attachFav(it){it.addEventListener('pointerdown',ev=>{ev.preventDefault();const name=it.dataset.name,cat=it.dataset.cat,sx=ev.clientX,sy=ev.clientY;let started=false;it.classList.add('lp');
  const t=setTimeout(()=>{it.classList.remove('lp');it.classList.add('fav-removing');setTimeout(()=>removeFavorite(name),360);},2000);
  try{it.setPointerCapture(ev.pointerId);}catch(_){}
  function mv(e2){if(!started&&Math.hypot(e2.clientX-sx,e2.clientY-sy)>6){started=true;clearTimeout(t);it.classList.remove('lp');newDrag={name,cat};dragghost.style.setProperty('--gc',CAT[cat].color);dragghost.innerHTML=`<span class="gi"><i data-lucide="${NAME_ICON[name]||CAT[cat].icon}"></i></span>${name}`;if(window.lucide)lucide.createIcons();dragghost.classList.add('show');}if(started)moveGhost(e2);}

  it.addEventListener('pointermove',mv);it.addEventListener('pointerup',up);});}

let lpTimer=null,lpIcon=null,lpLong=false;

function buildFilter(){
  filterPop.innerHTML='<div class="filter-head"><span>Categories</span><button id="fp-all">All</button></div>';
  for(const [key,c] of Object.entries(CAT)){const row=document.createElement('div');row.className='fp-row on';row.dataset.cat=key;row.style.setProperty('--c',c.color);
    row.innerHTML=`<span class="fp-dot"></span><span class="fp-name">${c.label}</span><span class="fp-check"><i data-lucide="check"></i></span>`;
    row.onclick=()=>{if(activeCats.has(key)){if(activeCats.size>1)activeCats.delete(key);}else activeCats.add(key);syncFilter();};
    filterPop.appendChild(row);}
  if(window.lucide)lucide.createIcons();
  filterPop.querySelector('#fp-all').onclick=()=>{Object.keys(CAT).forEach(k=>activeCats.add(k));syncFilter();};
}
function syncFilter(){
  filterPop.querySelectorAll('.fp-row').forEach(r=>r.classList.toggle('on',activeCats.has(r.dataset.cat)));

  filterBtn.classList.toggle('active',activeCats.size<Object.keys(CAT).length);

/* ===== align / distribute ===== */
function selEls(){return [...selection].map(id=>nodes[id].el);}
function alignSel(type){
  const els=selEls();if(els.length<2)return;
  const r=els.map(el=>({el,x:el.offsetLeft,y:el.offsetTop,w:el.offsetWidth,h:el.offsetHeight}));
  const minX=Math.min(...r.map(o=>o.x)),maxR=Math.max(...r.map(o=>o.x+o.w)),cX=(minX+maxR)/2;
  const minY=Math.min(...r.map(o=>o.y)),maxB=Math.max(...r.map(o=>o.y+o.h)),cY=(minY+maxB)/2;
  const tg=new Map();
  if(type==='left')r.forEach(o=>tg.set(o.el,{x:minX,y:o.y}));
  else if(type==='right')r.forEach(o=>tg.set(o.el,{x:maxR-o.w,y:o.y}));
  else if(type==='hcenter')r.forEach(o=>tg.set(o.el,{x:cX-o.w/2,y:o.y}));
  else if(type==='top')r.forEach(o=>tg.set(o.el,{x:o.x,y:minY}));
  else if(type==='bottom')r.forEach(o=>tg.set(o.el,{x:o.x,y:maxB-o.h}));
  else if(type==='vcenter')r.forEach(o=>tg.set(o.el,{x:o.x,y:cY-o.h/2}));
  else if(type==='dh'){const s=[...r].sort((a,b)=>(a.x+a.w/2)-(b.x+b.w/2));const c0=s[0].x+s[0].w/2,c1=s[s.length-1].x+s[s.length-1].w/2,step=(c1-c0)/(s.length-1);s.forEach((o,i)=>tg.set(o.el,{x:c0+step*i-o.w/2,y:o.y}));}
  else if(type==='dv'){const s=[...r].sort((a,b)=>(a.y+a.h/2)-(b.y+b.h/2));const c0=s[0].y+s[0].h/2,c1=s[s.length-1].y+s[s.length-1].h/2,step=(c1-c0)/(s.length-1);s.forEach((o,i)=>tg.set(o.el,{x:o.x,y:c0+step*i-o.h/2}));}
  animateMove(tg);
}
function animateMove(tg){
  tg.forEach((p,el)=>{el.style.transition='left .42s cubic-bezier(.2,.7,.2,1),top .42s cubic-bezier(.2,.7,.2,1)';el.style.left=p.x+'px';el.style.top=p.y+'px';});
  const t0=performance.now();(function f(){recomputeEndpoints();updateMinimap();if(performance.now()-t0<460)requestAnimationFrame(f);else tg.forEach((p,el)=>el.style.transition='');})();
}

/* ===== pan / drag / marquee ===== */
const vp=document.getElementById('viewport'),marquee=document.getElementById('marquee');
let mode=null,pan=null,drag=null,mq=null;
let snapOn=true,tool='select';

vp.addEventListener('pointerdown',e=>{
  if(tool==='hand'){mode='pan';pan={sx:e.clientX,sy:e.clientY,tx,ty};vp.classList.add('panning');userAdjusted=true;try{vp.setPointerCapture(e.pointerId);}catch(_){}return;}

  if(nodeEl&&!e.target.closest('.port')){
    const id=nodeEl.dataset.id;
    if(e.shiftKey)toggleSel(id);else if(!selection.has(id))selectOnly(id);
    if(selection.has(id)){mode='drag';drag={sx:e.clientX,sy:e.clientY,items:selEls().map(el=>({el,ox:el.offsetLeft,oy:el.offsetTop}))};selEls().forEach(bringFront);nodeEl.classList.add('dragging');}
  } else if(!nodeEl){

vp.addEventListener('pointermove',e=>{
  if(mode==='pan'){tx=pan.tx+(e.clientX-pan.sx);ty=pan.ty+(e.clientY-pan.sy);applyTransform();}
  else if(mode==='drag'){const dx=(e.clientX-drag.sx)/scale,dy=(e.clientY-drag.sy)/scale;
    drag.items.forEach(it=>{it.el.style.left=snap(it.ox+dx)+'px';it.el.style.top=snap(it.oy+dy)+'px';});recomputeEndpoints();updateMinimap();autoWireUpdate();resolveWireClamp();}

  }

vp.addEventListener('wheel',e=>{e.preventDefault();userAdjusted=true;const ns=Math.min(2.4,Math.max(.32,scale*Math.exp(-e.deltaY*0.0014))),r=ns/scale;tx=e.clientX-(e.clientX-tx)*r;ty=e.clientY-(e.clientY-ty)*r;scale=ns;applyTransform();},{passive:false});

/* ===== wiring (connect sockets, with whip on connect) ===== */
let wiring=null;
function startWiring(port,e){if(wiring)cancelWiring();const sel=port.dataset.port,dir=port.closest('.ports-out')?'out':'in';mode='wire';const tp=NS('path');tp.setAttribute('class','wire-temp');svg.appendChild(tp);wiring={sel,dir,tp};updateWireTemp(e);}
function updateWireTemp(e){if(!wiring)return;const wr=world.getBoundingClientRect();const a=socketCenter(wiring.sel,wr);if(!a)return;const cx=(e.clientX-tx)/scale,cy=(e.clientY-ty)/scale,dx=Math.max(40,Math.abs(cx-a.x)*0.5),from=wiring.dir==='out';
  wiring.tp.setAttribute('d',`M ${a.x} ${a.y} C ${a.x+(from?dx:-dx)} ${a.y}, ${cx+(from?-dx:dx)} ${cy}, ${cx} ${cy}`);
  clearTargetHi();const el=document.elementFromPoint(e.clientX,e.clientY),tp=el&&el.closest('.port');
  if(tp){const td=tp.closest('.ports-out')?'out':'in';if(td!==wiring.dir&&tp.dataset.port.split(':')[0]!==wiring.sel.split(':')[0])tp.classList.add('wire-ok');}}

function stepPhysics(o){const mx=(o.e.ax+o.e.bx)/2,my=(o.e.ay+o.e.by)/2,sag=restSag(o);
  if(reduceMotion){o.off.x=0;o.off.y=sag;o.pm={x:mx,y:my};return;}

  const dmx=mx-o.pm.x,dmy=my-o.pm.y;o.pm.x=mx;o.pm.y=my;

  const vmax=62;o.vel.x=Math.max(-vmax,Math.min(vmax,o.vel.x));o.vel.y=Math.max(-vmax,Math.min(vmax,o.vel.y));

/* ===== minimap ===== */
const mmEdges=document.getElementById('mm-edges'),mmNodesG=document.getElementById('mm-nodes'),mmVp=document.getElementById('mm-vp');
const mmW=188,mmH=120;let mmS=1,mmB=null,mmOx=0,mmOy=0,mmPadX=16,mmPadTop=26,mmPadBot=12;
function renderMinimap(){
  const bd=graphBounds();const gw=bd.maxX-bd.minX,gh=bd.maxY-bd.minY;
  if(!isFinite(gw)||!isFinite(gh)||gw<=0||gh<=0)return;
  mmB=bd;const padX=mmPadX,padTop=mmPadTop,padBot=mmPadBot,availW=mmW-padX*2,availH=mmH-padTop-padBot;
  mmS=Math.min(availW/gw,availH/gh,0.2);
  mmOx=padX+(availW-gw*mmS)/2;mmOy=padTop+(availH-gh*mmS)/2;
  const mx=x=>mmOx+(x-bd.minX)*mmS,my=y=>mmOy+(y-bd.minY)*mmS;
  mmEdges.innerHTML='';mmNodesG.innerHTML='';
  GRAPH.edges.forEach(e=>{const s=nodes[e.from.split(':')[0]],t=nodes[e.to.split(':')[0]];if(!s||!t)return;
    const ln=NS('line');ln.setAttribute('class','mm-edge');ln.setAttribute('x1',mx(s.el.offsetLeft+s.el.offsetWidth));ln.setAttribute('y1',my(s.el.offsetTop+s.el.offsetHeight/2));ln.setAttribute('x2',mx(t.el.offsetLeft));ln.setAttribute('y2',my(t.el.offsetTop+t.el.offsetHeight/2));mmEdges.appendChild(ln);});

    rc.setAttribute('x',mx(el.offsetLeft));rc.setAttribute('y',my(el.offsetTop));rc.setAttribute('width',Math.max(6,el.offsetWidth*mmS));rc.setAttribute('height',Math.max(4,el.offsetHeight*mmS));rc.setAttribute('rx','2.5');rc.setAttribute('fill',col);mmNodesG.appendChild(rc);}
}
function updateMinimap(){if(!mmB)return;const bd=mmB,s=mmS,cl=(v,a,b)=>Math.max(a,Math.min(b,v));

const cv=document.getElementById('bg'),bctx=cv.getContext('2d');let DPR=Math.min(2,devicePixelRatio||1),gridOn=true;
const blobs=[{x:.62,y:.24,r:460,c:'59,130,246',a:.07,ph:0},{x:.18,y:.82,r:380,c:'52,228,234',a:.05,ph:2.1},{x:.86,y:.66,r:320,c:'120,90,240',a:.045,ph:4.2},{x:.45,y:.52,r:300,c:'40,110,200',a:.035,ph:1.2}];

function sizeCanvas(){DPR=Math.min(2,devicePixelRatio||1);cv.width=innerWidth*DPR;cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
function drawBG(){const W=cv.width,H=cv.height,T=reduceMotion?0:performance.now()/1000;bctx.clearRect(0,0,W,H);
  bctx.globalCompositeOperation='lighter';for(const bl of blobs){const px=(bl.x*innerWidth+Math.sin(T*0.06+bl.ph)*46)*DPR,py=(bl.y*innerHeight+Math.cos(T*0.05+bl.ph)*34)*DPR,g=bctx.createRadialGradient(px,py,0,px,py,bl.r*DPR);g.addColorStop(0,`rgba(${bl.c},${bl.a})`);g.addColorStop(1,`rgba(${bl.c},0)`);bctx.fillStyle=g;bctx.fillRect(0,0,W,H);}

/* ===== toolbar toggles ===== */
const body=document.body;
const bsg=document.getElementById('btn-signal');bsg.onclick=()=>{body.classList.toggle('signals-on');bsg.classList.toggle('on',body.classList.contains('signals-on'));};
const bsn=document.getElementById('btn-snap');bsn.onclick=()=>{snapOn=!snapOn;bsn.classList.toggle('active',snapOn);};
const bgr=document.getElementById('btn-grid');bgr.onclick=()=>{gridOn=!gridOn;bgr.classList.toggle('active',gridOn);drawBG();};

/* ===== loop (wire wobble + sparks only) ===== */
function tick(now){
  const boost=body.classList.contains('signals-on');
  if(!reduceMotion)drawBG();
  for(const o of wires)stepPhysics(o);
  renderWires();
  for(const o of wires){const L=o.base.getTotalLength();for(const s of o.sparks){
    if(!reduceMotion&&boost){s.p+=0.0052;if(s.p>1)s.p-=1;}
    const pp=s.p,pt=o.base.getPointAtLength(pp*L);s.el.setAttribute('cx',pt.x);s.el.setAttribute('cy',pt.y);
    const edge=pp<0.05?pp/0.05:(pp>0.95?(1-pp)/0.05:1);s.el.setAttribute('opacity',(reduceMotion||!boost)?0:edge);}}
  requestAnimationFrame(tick);
}
function tickWireDel(){if(selectedWire)updateWireDel();requestAnimationFrame(tickWireDel);}requestAnimationFrame(tickWireDel);

/* ===== init ===== */
let started=false;
function boot(){if(started)return;started=true;sizeCanvas();buildWires();renderMinimap();fit(false);
  if(!reduceMotion)GRAPH.nodes.forEach((n,i)=>setTimeout(()=>nodes[n.id].el.classList.add('in'),100+i*120));
  requestAnimationFrame(tick);[120,400,900].forEach(ms=>setTimeout(()=>{if(!userAdjusted)fit(false);else{recomputeEndpoints();renderMinimap();updateMinimap();}},ms));}
if(document.readyState==='complete')setTimeout(boot,30);else addEventListener('load',()=>setTimeout(boot,30));
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(()=>{if(started){recomputeEndpoints();renderMinimap();}});
addEventListener('resize',()=>{sizeCanvas();if(!userAdjusted)fit(false);else{recomputeEndpoints();renderMinimap();updateMinimap();}});
/* ResizeObserver catches the iframe's late/final sizing that 'resize' misses, recovering fit+wires+minimap from one settled trigger regardless of rAF throttling */
if(window.ResizeObserver){let _lw=0,_lh=0;const ro=new ResizeObserver(()=>{const w=innerWidth,h=innerHeight;if(w===_lw&&h===_lh)return;_lw=w;_lh=h;sizeCanvas();if(!userAdjusted)fit(false);else{recomputeEndpoints();renderMinimap();updateMinimap();}});ro.observe(document.documentElement);ro.observe(document.body);}
addEventListener('keydown',e=>{const tag=(e.target.tagName||'').toLowerCase();if(tag==='input'||tag==='textarea')return;if(e.key==='Escape'){clearSel();deselectWire();}else if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();if(selectedWire){const w=selectedWire;deselectWire();cutWire(w);renderMinimap();}else deleteSelected();}});
</script>
</body>
</html>
