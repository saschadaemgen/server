<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CARVILON Stream Spike</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      padding: 1.5rem;
      background: #0f1115;
      color: #e6e6e6;
    }
    h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 1rem; }
    .row { display: flex; gap: .75rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    button, select {
      background: #2563eb; color: white; border: 0; border-radius: 6px;
      padding: .55rem 1rem; font-size: .95rem; cursor: pointer;
    }
    select { background: #1a1d24; border: 1px solid #374151; }
    button:disabled { background: #555; cursor: not-allowed; }
    button.secondary { background: #374151; }
    #status { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .85rem; opacity: .85; }
    video {
      width: 100%; max-width: 960px; background: #000;
      border-radius: 8px; aspect-ratio: 16 / 9;
    }
    #log {
      margin-top: 1rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .8rem; white-space: pre-wrap; background: #1a1d24;
      padding: .75rem; border-radius: 6px; max-height: 14rem; overflow: auto;
    }
  </style>
</head>
<body>
  <h1>CARVILON Stream-Server — multi-camera spike</h1>
  <div class="row">
    <label for="profile" style="font-size:.85rem;opacity:.85">Profile</label>
    <select id="profile"></select>
    <button id="connect">Connect</button>
    <button id="disconnect" class="secondary" disabled>Disconnect</button>
    <span id="status">idle</span>
  </div>
  <video id="video" autoplay playsinline muted controls></video>
  <pre id="log"></pre>

  <script>
    const $profile    = document.getElementById('profile');
    const $connect    = document.getElementById('connect');
    const $disconnect = document.getElementById('disconnect');
    const $status     = document.getElementById('status');
    const $video      = document.getElementById('video');
    const $log        = document.getElementById('log');

    let pc = null;

    const log = (...args) => {
      const ts = new Date().toISOString().slice(11, 23);
      $log.textContent += `[${ts}] ${args.join(' ')}\n`;
      $log.scrollTop = $log.scrollHeight;
    };
    const setStatus = (s) => { $status.textContent = s; };

    async function loadProfiles() {
      try {
        const res = await fetch('/api/profiles');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const all = await res.json();
        const browsers = all.filter(p => p.usage === 'browser');
        if (browsers.length === 0) {
          log('no browser profiles registered — /offer will not work');
          $connect.disabled = true;
          return;
        }
        $profile.innerHTML = '';
        for (const p of browsers) {
          const opt = document.createElement('option');
          opt.value = p.name;
          opt.textContent = p.description ? `${p.name} — ${p.description}` : p.name;
          $profile.appendChild(opt);
        }
        log(`loaded ${browsers.length} browser profile(s)`);
      } catch (err) {
        log('profile load failed:', err.message);
        $connect.disabled = true;
      }
    }

    async function connect() {
      const profileName = $profile.value;
      if (!profileName) {
        log('no profile selected');
        return;
      }
      $connect.disabled = true;
      setStatus(`creating peer for ${profileName}…`);

      pc = new RTCPeerConnection();
      pc.addTransceiver('video', { direction: 'recvonly' });

      pc.ontrack = (ev) => {
        log('ontrack', ev.track.kind, ev.streams.length, 'stream(s)');
        if (ev.streams && ev.streams[0]) {
          $video.srcObject = ev.streams[0];
        }
      };
      pc.onconnectionstatechange = () => {
        log('peer state:', pc.connectionState);
        setStatus(`peer: ${pc.connectionState}`);
        if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
          $disconnect.disabled = true;
          $connect.disabled = false;
        }
      };
      pc.oniceconnectionstatechange = () => log('ice state:', pc.iceConnectionState);

      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await iceGatheringComplete(pc);
        log(`offer ready, posting /offer?src=${profileName}`);

        const res = await fetch(`/offer?src=${encodeURIComponent(profileName)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/sdp' },
          body: pc.localDescription.sdp,
        });
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(`offer rejected: ${res.status} ${txt}`);
        }
        const answerSdp = await res.text();
        await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
        log('answer applied');
        $disconnect.disabled = false;
      } catch (err) {
        log('error:', err.message);
        setStatus(`error: ${err.message}`);
        await disconnect();
      }
    }

    async function disconnect() {
      if (pc) {
        try { pc.close(); } catch {}
        pc = null;
      }
      $video.srcObject = null;
      $disconnect.disabled = true;
      $connect.disabled = false;
      setStatus('idle');
    }

    function iceGatheringComplete(pc) {
      if (pc.iceGatheringState === 'complete') return Promise.resolve();
      return new Promise((resolve) => {
        const check = () => {
          if (pc.iceGatheringState === 'complete') {
            pc.removeEventListener('icegatheringstatechange', check);
            resolve();
          }
        };
        pc.addEventListener('icegatheringstatechange', check);
      });
    }

    $connect.addEventListener('click', connect);
    $disconnect.addEventListener('click', disconnect);
    loadProfiles();
  </script>
</body>
</html>
