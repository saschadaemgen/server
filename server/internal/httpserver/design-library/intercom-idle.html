<!--
  unifix - intercom-idle.html
  Tenant-facing idle screen. Drop into a host page whose <body>
  has the `.stage-room` class:

    <body class="stage-room">
      {{template "intercom-idle" .}}
    </body>

  Required server data:
    .UnitName               - Wohnungs-Bezeichnung, e.g. "Daemgen"
    .DoorName               - Tuer-Bezeichnung, e.g. "Hauseingang"
    .Now                    - pre-formatted time HH:MM:SS (or hydrate client-side)
    .NowDate                - pre-formatted "Di, 13. Mai"
    .DND                    - bool, "do not disturb" active
    .HasUnread              - bool, unread bell events
    .IdleViewMode           - "screensaver" or "livestream" (default mode of the slot)
    .Weather                - optional weather snapshot or nil
    .AutoScreensaverSeconds - 0=off, otherwise the persisted timer (saison 14-03)
-->

<div class="stage" data-screen="idle">
  <div class="screen-idle">

    <!-- Top bar: identity - controls - clock -->
    <div class="topbar">

      <div class="identity">
        <span class="identity-sub">{{if .DND}}Nicht stören{{else}}Online{{end}}</span>
        <span class="identity-unit">{{.UnitName}}</span>
      </div>

      <div class="control-group" role="toolbar" aria-label="Geräte-Steuerung">

        <button class="ctrl" data-action="open-cameras" aria-label="Kameras" title="Kameras">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="6.5" width="13" height="11" rx="2.2"/>
            <path d="M16 10l5-2.6v9.2L16 14z"/>
          </svg>
        </button>

        <span class="ctrl-sep" aria-hidden="true"></span>

        <button class="ctrl{{if .DND}} is-on{{end}}" data-action="toggle-dnd" aria-pressed="{{.DND}}" aria-label="Nicht stören" title="Nicht stören">
          {{if .DND}}
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 17h13l-1.4-1.8c-.4-.5-.6-1.1-.6-1.8V10a4.5 4.5 0 0 0-9 0v3.4c0 .7-.2 1.3-.6 1.8L5.5 17Z"/>
              <path d="M10 19.5a2 2 0 0 0 4 0"/>
              <path d="M4 4l16 16"/>
            </svg>
          {{else}}
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5.5 17h13l-1.4-1.8c-.4-.5-.6-1.1-.6-1.8V10a4.5 4.5 0 0 0-9 0v3.4c0 .7-.2 1.3-.6 1.8L5.5 17Z"/>
              <path d="M10 19.5a2 2 0 0 0 4 0"/>
            </svg>
          {{end}}
        </button>

        <span class="ctrl-sep" aria-hidden="true"></span>

        <!-- Saison 14-03: settings button toggles the inline
             settings mode instead of navigating away. idle.js
             intercepts the click; the legacy /webviewer/settings
             page stays as fallback if JS is off. -->
        <button class="ctrl" data-action="open-settings" aria-label="Einstellungen" title="Einstellungen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="2.6"/>
            <path d="M19.4 14.6a1.5 1.5 0 0 0 .3 1.7l.1.1a1.7 1.7 0 1 1-2.4 2.4l-.1-.1a1.5 1.5 0 0 0-1.7-.3 1.5 1.5 0 0 0-.9 1.4V20a1.7 1.7 0 1 1-3.4 0v-.1a1.5 1.5 0 0 0-1-1.4 1.5 1.5 0 0 0-1.7.3l-.1.1a1.7 1.7 0 1 1-2.4-2.4l.1-.1a1.5 1.5 0 0 0 .3-1.7 1.5 1.5 0 0 0-1.4-.9H4a1.7 1.7 0 1 1 0-3.4h.1a1.5 1.5 0 0 0 1.4-1 1.5 1.5 0 0 0-.3-1.7l-.1-.1a1.7 1.7 0 1 1 2.4-2.4l.1.1a1.5 1.5 0 0 0 1.7.3h.1A1.5 1.5 0 0 0 10.4 4v-.1a1.7 1.7 0 1 1 3.4 0V4a1.5 1.5 0 0 0 .9 1.4 1.5 1.5 0 0 0 1.7-.3l.1-.1a1.7 1.7 0 1 1 2.4 2.4l-.1.1a1.5 1.5 0 0 0-.3 1.7v.1a1.5 1.5 0 0 0 1.4.9H20a1.7 1.7 0 1 1 0 3.4h-.1a1.5 1.5 0 0 0-1.4.9Z"/>
          </svg>
        </button>

      </div>

      <div class="clock" aria-label="{{.NowDate}}, {{.Now}}">
        <span class="clock-date">{{.NowDate}}</span>
        <span class="clock-time" data-bind="clock-time">{{.Now}}</span>
      </div>

    </div>

    <!-- Stream slot: where the camera feed renders. Always-dark.
         Saison 14-03: four mode-layers stacked inside the existing
         .stream slot. idle.js slides them up/down from below using
         CSS transforms (400ms cubic-bezier). The .mode-active layer
         sits at translateY(0); inactive layers wait at
         translateY(100%) just below the visible area. No fullscreen
         overlay, no body-level positioning - everything is scoped
         to the slot so the topbar, action-bar, and bell-overlay
         stay clickable. -->
    <div class="stream" role="region" aria-label="Kamerastream {{.DoorName}}">
      <div id="idle-container"
           data-default-mode="{{.IdleViewMode}}"
           data-auto-screensaver-seconds="{{.AutoScreensaverSeconds}}">

        <!-- 1. Screensaver: clock + date + weather. Default unless
             the operator persisted livestream as their default. -->
        <div class="mode-layer{{if ne .IdleViewMode "livestream"}} mode-active{{end}}" data-mode="screensaver">
          <div class="screensaver-clock">{{.Now}}</div>
          <div class="screensaver-date">{{.NowDate}}</div>
          {{if .Weather}}
            <div class="screensaver-weather">
              <span class="screensaver-weather-icon" data-icon="{{.Weather.Icon}}" aria-hidden="true"></span>
              <span class="screensaver-temp">{{printf "%.0f" .Weather.TempC}}&deg;C</span>
              <span class="screensaver-desc">{{.Weather.Description}}</span>
            </div>
          {{else}}
            <div class="screensaver-weather" style="display:none;">
              <span class="screensaver-weather-icon" data-icon="cloud" aria-hidden="true"></span>
              <span class="screensaver-temp"></span>
              <span class="screensaver-desc"></span>
            </div>
          {{end}}
        </div>

        <!-- 2. Livestream: MJPEG img. Saison 14-03-FIX-1b: src is
             EMPTY at render-time; idle.js fills it from
             data-stream-src on DOMContentLoaded, so the multipart
             response never blocks page paint. -->
        <div class="mode-layer{{if eq .IdleViewMode "livestream"}} mode-active{{end}}" data-mode="livestream">
          <img alt="Live-Bild"
               class="mieter-stream-img"
               data-stream-src="/webviewer/stream.mjpeg"
               onerror="this.style.display='none'"/>
        </div>

        <!-- 3. Inline settings (saison 14-03). Standalone
             /webviewer/settings stays available as fallback for
             JS-off browsers; the inline form POSTs the same
             endpoint with Accept: application/json and patches
             the runtime without a reload. -->
        <div class="mode-layer" data-mode="settings">
          <form class="mode-settings" data-form="settings"
                action="/webviewer/settings" method="post">
            <header class="mode-header">
              <h2>Einstellungen</h2>
              <button type="button" class="mode-close" data-action="mode-close" aria-label="Schließen">×</button>
            </header>

            <fieldset class="mode-field">
              <legend>
                Ruhe-Ansicht
                <span class="mode-help" data-help="Was sieht der Mieter wenn nichts klingelt: Uhr+Datum (Bildschirmschoner) oder direkt das Kamerabild (Live-Stream).">?</span>
              </legend>
              <label><input type="radio" name="idle_view_mode" value="screensaver"{{if ne .IdleViewMode "livestream"}} checked{{end}}> Bildschirmschoner (Uhr &amp; Wetter)</label>
              <label><input type="radio" name="idle_view_mode" value="livestream"{{if eq .IdleViewMode "livestream"}} checked{{end}}> Live-Stream (Türkamera)</label>
            </fieldset>

            <fieldset class="mode-field">
              <legend>
                Auto-Bildschirmschoner
                <span class="mode-help" data-help="Wenn der Mieter eine Weile nichts macht, gleitet die Anzeige zurück zum Bildschirmschoner. Nur sinnvoll wenn 'Bildschirmschoner' oben gewählt ist.">?</span>
              </legend>
              <label><input type="radio" name="auto_screensaver" value="0"{{if eq .AutoScreensaverSeconds 0}} checked{{end}}> aus</label>
              <label><input type="radio" name="auto_screensaver" value="30"{{if eq .AutoScreensaverSeconds 30}} checked{{end}}> 30 Sekunden</label>
              <label><input type="radio" name="auto_screensaver" value="60"{{if eq .AutoScreensaverSeconds 60}} checked{{end}}> 1 Minute</label>
              <label><input type="radio" name="auto_screensaver" value="300"{{if eq .AutoScreensaverSeconds 300}} checked{{end}}> 5 Minuten</label>
              <label><input type="radio" name="auto_screensaver" value="600"{{if eq .AutoScreensaverSeconds 600}} checked{{end}}> 10 Minuten</label>
            </fieldset>

            <div class="mode-actions">
              <button type="submit" class="mode-submit">Speichern</button>
              <span class="mode-form-status" data-bind="settings-status" role="status" aria-live="polite"></span>
            </div>
          </form>
        </div>

        <!-- 4. Inline history (saison 14-03). Empty container;
             idle.js fetches /webviewer/history.json on first open
             and renders the list. Subsequent opens re-fetch so the
             list stays current without an SSE history-channel. -->
        <div class="mode-layer" data-mode="history">
          <header class="mode-header">
            <h2>Verlauf</h2>
            <button type="button" class="mode-close" data-action="mode-close" aria-label="Schließen">×</button>
          </header>
          <div class="mode-history" data-bind="history-list" role="list">
            <div class="mode-history-empty" data-bind="history-empty">Lade...</div>
          </div>
        </div>

      </div>
      <div class="stream-meta">
        <span class="stream-meta-dot"></span>
        <span>cam · {{.DoorName}}</span>
      </div>
    </div>

    <!-- Action bar: microphone - door-unlock - history -->
    <div class="actions" role="toolbar" aria-label="Aktionen">

      <button class="action" data-action="toggle-mic" aria-label="Mikrofon" title="Mikrofon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="3" width="6" height="11" rx="3"/>
          <path d="M6 11a6 6 0 0 0 12 0"/>
          <path d="M12 17v3"/>
          <path d="M9 20h6"/>
        </svg>
      </button>

      <button class="action is-primary" data-action="unlock-door" aria-label="Tür öffnen" title="Tür öffnen">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="14" r="3.5"/>
          <path d="M10.5 12.5 20 3"/>
          <path d="M17 6l2 2"/>
          <path d="M15 8l2 2"/>
        </svg>
      </button>

      <button class="action" data-action="open-history" aria-label="Verlauf" title="Verlauf">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="8.5"/>
          <path d="M12 7.5V12l3 2"/>
        </svg>
        {{if .HasUnread}}<span class="action-badge" aria-hidden="true"></span>{{end}}
      </button>

    </div>

  </div>
</div>
