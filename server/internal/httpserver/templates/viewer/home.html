<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>unifix - {{.UnitName}}</title>
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/components.css">
  <style>
    /* Saison 14-01b: idle-container CSS lives inline because the
       design-library style sheet pre-dates this layout. Each .idle-view
       is a full-stage overlay; .idle-hidden swaps them. */
    #idle-container {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      cursor: pointer;
    }
    .idle-view {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--color-text);
      background: var(--color-bg);
      transition: opacity 0.15s ease-in-out;
    }
    .idle-view.idle-hidden { display: none; }

    /* Screensaver layout: clock huge, date medium, weather row
       at the bottom centred. */
    #screensaver { padding: var(--space-6); text-align: center; }
    .screensaver-clock {
      font-size: clamp(64px, 18vw, 168px);
      font-weight: 200;
      letter-spacing: -0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .screensaver-date {
      margin-top: var(--space-3);
      font-size: clamp(16px, 3vw, 24px);
      color: var(--color-text-secondary);
      text-transform: capitalize;
    }
    .screensaver-weather {
      margin-top: var(--space-6);
      display: flex; align-items: center; gap: var(--space-3);
      font-size: clamp(18px, 3vw, 26px);
      color: var(--color-text-secondary);
    }
    .screensaver-weather [data-icon] {
      display: inline-block; width: 28px; height: 28px;
      background: currentColor; opacity: 0.8;
      mask-size: contain; -webkit-mask-size: contain;
      mask-repeat: no-repeat; -webkit-mask-repeat: no-repeat;
      mask-position: center; -webkit-mask-position: center;
    }
    /* Livestream layout: img fills the stage. */
    #livestream { padding: 0; }
    .mieter-stream-img {
      width: 100%; height: 100%; object-fit: cover;
    }

    /* Settings-Icon top-right, subtle. */
    .mieter-settings-link {
      position: fixed; top: 12px; right: 12px;
      z-index: 50;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: var(--color-text);
      text-decoration: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .mieter-settings-link:hover { background: rgba(255, 255, 255, 0.16); }

    @media (min-width: 640px) {
      .stage {
        width: min(520px, 80vw);
        height: min(1040px, 92vh);
        border-radius: 44px;
      }
    }
    @media (min-width: 1024px) {
      .stage {
        width: min(600px, 42vw);
        height: min(1100px, 92vh);
      }
    }
    @media (max-width: 639px) {
      .stage-room { background: var(--color-bg); }
      .stage {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body class="stage-room">

  <div class="stage">
    <div id="idle-container" data-default-mode="{{.IdleViewMode}}">

      <div id="screensaver" class="idle-view{{if eq .IdleViewMode "livestream"}} idle-hidden{{end}}">
        <div class="screensaver-clock">{{.Now}}</div>
        <div class="screensaver-date">{{.NowDate}}</div>
        {{if .Weather}}
          <div class="screensaver-weather">
            <span data-icon="{{.Weather.Icon}}" aria-hidden="true"></span>
            <span class="screensaver-temp">{{printf "%.0f" .Weather.TempC}}&deg;C</span>
            <span class="screensaver-desc">{{.Weather.Description}}</span>
          </div>
        {{else}}
          <div class="screensaver-weather" style="display:none;">
            <span data-icon="cloud" aria-hidden="true"></span>
            <span class="screensaver-temp"></span>
            <span class="screensaver-desc"></span>
          </div>
        {{end}}
      </div>

      <div id="livestream" class="idle-view{{if ne .IdleViewMode "livestream"}} idle-hidden{{end}}">
        <img src="/einloggen/stream.mjpeg"
             alt="Live-Bild"
             class="mieter-stream-img"
             onerror="this.style.display='none'"/>
      </div>

    </div>

    {{template "intercom-ringing.html" .}}
  </div>

  <a class="mieter-settings-link" href="/einloggen/settings" title="Einstellungen" aria-label="Einstellungen">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="2.6"/>
      <path d="M19.4 14.6a1.5 1.5 0 0 0 .3 1.7l.1.1a1.7 1.7 0 1 1-2.4 2.4l-.1-.1a1.5 1.5 0 0 0-1.7-.3 1.5 1.5 0 0 0-.9 1.4V20a1.7 1.7 0 1 1-3.4 0v-.1a1.5 1.5 0 0 0-1-1.4 1.5 1.5 0 0 0-1.7.3l-.1.1a1.7 1.7 0 1 1-2.4-2.4l.1-.1a1.5 1.5 0 0 0 .3-1.7 1.5 1.5 0 0 0-1.4-.9H4a1.7 1.7 0 1 1 0-3.4h.1a1.5 1.5 0 0 0 1.4-1 1.5 1.5 0 0 0-.3-1.7l-.1-.1a1.7 1.7 0 1 1 2.4-2.4l.1.1a1.5 1.5 0 0 0 1.7.3h.1A1.5 1.5 0 0 0 10.4 4v-.1a1.7 1.7 0 1 1 3.4 0V4a1.5 1.5 0 0 0 .9 1.4 1.5 1.5 0 0 0 1.7-.3l.1-.1a1.7 1.7 0 1 1 2.4 2.4l-.1.1a1.5 1.5 0 0 0-.3 1.7v.1a1.5 1.5 0 0 0 1.4.9H20a1.7 1.7 0 1 1 0 3.4h-.1a1.5 1.5 0 0 0-1.4.9Z"/>
    </svg>
  </a>

  <script src="/static/interactions.js"></script>
  <script src="/static/idle.js"></script>
  <script>
    // Saison 13-03-HOTFIX2 klingel lifecycle wire-up. Lives
    // inline because it depends on the per-page DOM rather than
    // a generic library. Saison 14-01b kept it verbatim; only
    // the idle screen changed around it.
    (function () {
      var ringEl = document.querySelector('.ringing');

      function ringButtons() {
        return document.querySelectorAll('.ring-btn');
      }
      function enableRingButtons(eventID, intercomMAC) {
        ringButtons().forEach(function (btn) {
          btn.classList.remove('is-disabled');
          btn.removeAttribute('disabled');
          btn.dataset.eventId = eventID || '';
          btn.dataset.intercomMac = intercomMAC || '';
        });
      }
      function disableRingButtons() {
        ringButtons().forEach(function (btn) {
          btn.classList.add('is-disabled');
          btn.setAttribute('disabled', 'disabled');
          delete btn.dataset.eventId;
          delete btn.dataset.intercomMac;
        });
      }
      function closeRing() {
        if (window.unifix && unifix.closeOverlay) {
          unifix.closeOverlay('ringing');
        } else if (ringEl) {
          ringEl.classList.remove('is-open');
        }
        disableRingButtons();
      }

      var es = new EventSource('/einloggen/events');
      es.addEventListener('doorbell_start', function (e) {
        var data = {};
        try { data = JSON.parse(e.data) || {}; } catch (_) {}
        var raw = data.raw || {};
        var eventID = raw.cancel_token || raw.request_id || '';
        var intercomMAC = raw.device_id || data.door || '';
        enableRingButtons(eventID, intercomMAC);
        if (window.unifix && unifix.openOverlay) {
          unifix.openOverlay('ringing');
        } else if (ringEl) {
          ringEl.classList.add('is-open');
        }
      });
      es.addEventListener('doorbell_cancel', function () { closeRing(); });
      es.addEventListener('history_update', function () { location.reload(); });
      es.addEventListener('error', function () {
        if (window.console) console.warn('[unifix] sse error (browser will reconnect)');
      });

      function jsonPost(url, body) {
        return fetch(url, {
          method: 'POST',
          headers: body ? { 'Content-Type': 'application/json', 'Accept': 'application/json' } : { 'Accept': 'application/json' },
          credentials: 'same-origin',
          body: body ? JSON.stringify(body) : null
        });
      }

      document.addEventListener('click', function (e) {
        var btn = e.target.closest('.ring-btn');
        if (!btn || btn.disabled || btn.classList.contains('is-disabled')) return;
        var action = btn.dataset.action;
        var eventID = btn.dataset.eventId || '';
        var intercomMAC = btn.dataset.intercomMac || '';

        if (action === 'ignore-call') {
          if (eventID) {
            jsonPost('/einloggen/reject', { event_id: eventID }).catch(function () {});
          }
          closeRing();
          return;
        }
        if (action === 'unlock-door') {
          if (!intercomMAC) return;
          e.preventDefault();
          jsonPost('/einloggen/doors/' + encodeURIComponent(intercomMAC) + '/unlock', null)
            .catch(function () {});
          return;
        }
        if (action === 'accept-call') {
          if (!eventID) return;
          e.preventDefault();
          jsonPost('/einloggen/answer', { event_id: eventID })
            .then(function (r) {
              if (r.status === 409) { closeRing(); return null; }
              return r.json().catch(function () { return null; });
            })
            .catch(function () {});
          disableRingButtons();
          return;
        }
      });
    })();
  </script>

</body>
</html>
