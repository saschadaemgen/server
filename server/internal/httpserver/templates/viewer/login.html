<!doctype html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>unifix - Anmeldung</title>
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/components.css">
</head>
<body class="login-stage">
  <main class="login-card" role="main">
    <div class="login-brand">
      <span class="login-brand-mark" aria-hidden="true">u</span>
      <span class="login-brand-name">unifix</span>
    </div>
    <h1 class="login-title">Anmeldung</h1>
    <p class="login-subtitle">Bitte gib die Zugangsdaten ein, die der Hausverwalter dir gegeben hat.</p>

    {{if .Error}}
      <div class="banner banner-red" role="status" style="margin-bottom: var(--space-3);">{{.Error}}</div>
    {{end}}
    {{if .BlockedMsg}}
      <div class="banner banner-amber" role="status" style="margin-bottom: var(--space-3);">{{.BlockedMsg}}</div>
    {{end}}

    <form method="post" action="/m" autocomplete="on">
      <div class="field">
        <label class="field-label" for="username">Benutzername</label>
        <input class="input" id="username" name="username" type="text" autocomplete="username" required value="{{.Username}}"/>
      </div>
      <div class="field" style="margin-top:var(--space-3);">
        <label class="field-label" for="password">Passwort</label>
        <input class="input" id="password" name="password" type="password" autocomplete="current-password" required value="{{.PrefillPw}}"/>
      </div>
      <button class="btn btn-primary btn-lg" type="submit" style="width:100%; margin-top:var(--space-4);">Anmelden</button>
    </form>

    <p class="login-footer-note">Probleme beim Anmelden? Bitte beim Hausverwalter melden.</p>
  </main>
</body>
</html>
