<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>unifix · {{.UnitName}}</title>
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/components.css">
</head>
<body class="stage-room">

  <div class="stage">
    {{template "intercom-idle.html" .}}
    {{template "intercom-history.html" .}}
    {{template "intercom-ringing.html" .}}
  </div>

  <script>
    // The library snippets include `is-open` for standalone demo
    // browsing; strip it on first paint so sheets, overlays and
    // modals start hidden in the integrated app.
    (function () {
      var sels = [
        '[data-overlay]',
        '[data-sheet]',
        '[data-sheet-scrim]',
        '[data-modal]'
      ];
      var nodes = document.querySelectorAll(sels.join(','));
      for (var i = 0; i < nodes.length; i++) {
        nodes[i].classList.remove('is-open');
      }
    })();
  </script>
  <script src="/static/interactions.js"></script>
  <script>
    unifix.connectSSE("/m/events", {
      onDoorbellStart:  function () { unifix.openOverlay("ringing"); },
      onDoorbellCancel: function () { unifix.closeOverlay("ringing"); },
      onHistoryUpdate:  function () { location.reload(); }
    });
  </script>

</body>
</html>
