{{define "layout"}}<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} - unifix Admin</title>
{{template "theme_head" .}}
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-app-bg text-app-text antialiased min-h-screen">
{{if .ShowNav}}
<nav class="border-b border-app-border bg-app-glass backdrop-blur sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
    <div class="flex items-center gap-8">
      <a href="/a/" class="font-semibold tracking-tight text-app-text">unifix admin</a>
      <div class="flex items-center gap-1 text-sm">
        <a href="/a/" class="px-3 py-1.5 rounded-button text-app-text-2 hover:text-app-text hover:bg-app-border inline-flex items-center gap-2 transition-colors">
          <span class="w-4 h-4">{{icon "home"}}</span> Dashboard
        </a>
        <a href="/a/mocks" class="px-3 py-1.5 rounded-button text-app-text-2 hover:text-app-text hover:bg-app-border inline-flex items-center gap-2 transition-colors">
          <span class="w-4 h-4">{{icon "server"}}</span> Mock-Viewer
        </a>
        <a href="/a/users" class="px-3 py-1.5 rounded-button text-app-text-2 hover:text-app-text hover:bg-app-border inline-flex items-center gap-2 transition-colors">
          <span class="w-4 h-4">{{icon "users"}}</span> Mieter
        </a>
        <a href="/a/settings" class="px-3 py-1.5 rounded-button text-app-text-2 hover:text-app-text hover:bg-app-border inline-flex items-center gap-2 transition-colors">
          <span class="w-4 h-4">{{icon "settings"}}</span> Settings
        </a>
      </div>
    </div>
    <div class="flex items-center gap-2">
      {{template "theme_toggle" .}}
      <form method="POST" action="/a/logout" class="inline">
        <button class="px-3 py-1.5 rounded-button text-sm text-app-text-2 hover:text-app-text hover:bg-app-border inline-flex items-center gap-2 transition-colors">
          <span class="w-4 h-4">{{icon "log-out"}}</span> Abmelden
        </button>
      </form>
    </div>
  </div>
</nav>
{{end}}
<main class="max-w-6xl mx-auto px-6 py-8">
{{template "content" .}}
</main>
</body>
</html>{{end}}
