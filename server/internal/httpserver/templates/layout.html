{{define "layout"}}<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} - unifix Admin</title>
{{template "theme_head" .}}
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
{{if .ShowNav}}
<header class="app-header">
  <div class="app-header-grid">
    <a class="app-brand" href="/a/">
      <span class="app-brand-mark">{{icon "sparkle"}}</span>
      <span class="app-brand-text">unifix admin</span>
    </a>
    <nav class="app-nav">
      <a class="nav-item{{if eq .ActiveNav "dashboard"}} is-active{{end}}" href="/a/">
        {{icon "home"}}<span>Dashboard</span>
      </a>
      <a class="nav-item{{if eq .ActiveNav "mocks"}} is-active{{end}}" href="/a/mocks">
        {{icon "server"}}<span>Mock-Viewer</span>
      </a>
      <a class="nav-item{{if eq .ActiveNav "users"}} is-active{{end}}" href="/a/users">
        {{icon "users"}}<span>Mieter</span>
      </a>
      <a class="nav-item{{if eq .ActiveNav "settings"}} is-active{{end}}" href="/a/settings">
        {{icon "settings"}}<span>Settings</span>
      </a>
    </nav>
    <div class="app-header-actions">
      {{template "theme_toggle" .}}
      <form method="POST" action="/a/logout" class="flex">
        <button class="btn btn-secondary btn-small" type="submit">
          {{icon "log-out"}}<span>Abmelden</span>
        </button>
      </form>
    </div>
  </div>
</header>
{{end}}
<main class="page">
{{template "content" .}}
</main>
</body>
</html>{{end}}
