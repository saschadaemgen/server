{{define "theme_head"}}
<!-- Theme detection must run BEFORE the stylesheet to avoid a
     flash-of-wrong-theme on first paint. Reads localStorage,
     falls back to prefers-color-scheme. -->
<script>
(function() {
  try {
    var stored = localStorage.getItem('unifix-theme');
    var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = stored || (systemDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  } catch (_) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<!-- Phosphor Icons (regular weight). Picked over Lucide in
     S13-02-FIX1b because the regular weight has the SF-Symbols
     silhouette the rest of the UI is now styled after. -->
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="/static/theme.css">
{{end}}
