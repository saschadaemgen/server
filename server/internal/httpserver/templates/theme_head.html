{{define "theme_head"}}
<!-- Theme detection: must run BEFORE the stylesheet to avoid
     a flash-of-wrong-theme. Reads the persisted choice from
     localStorage, otherwise falls back to the OS preference. -->
<script>
(function() {
  try {
    var stored = localStorage.getItem('unifix-theme');
    var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = stored || (systemDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  } catch (_) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'SF Pro Text', 'Inter', 'system-ui', 'sans-serif'],
        mono: ['SF Mono', 'JetBrains Mono', 'ui-monospace', 'monospace'],
      },
      colors: {
        'app-bg':         'var(--bg-base)',
        'app-card':       'var(--bg-elevated)',
        'app-glass':      'var(--bg-glass)',
        'app-overlay':    'var(--bg-overlay)',
        'app-text':       'var(--text-primary)',
        'app-text-2':     'var(--text-secondary)',
        'app-text-3':     'var(--text-tertiary)',
        'app-blue':       'var(--accent-blue)',
        'app-blue-hover': 'var(--accent-blue-hover)',
        'app-red':        'var(--accent-red)',
        'app-green':      'var(--accent-green)',
        'app-amber':      'var(--accent-amber)',
        'app-border':     'var(--border-subtle)',
        'app-border-2':   'var(--border-card)',
      },
      borderRadius: {
        'card':   'var(--radius-card)',
        'button': 'var(--radius-button)',
        'pill':   'var(--radius-pill)',
      },
      boxShadow: {
        'card':    'var(--shadow-card)',
        'overlay': 'var(--shadow-overlay)',
      },
    },
  },
};
</script>
<style>
/* ------------------------------------------------------------------
   Apple-style theme variables.

   Two modes, switched by `data-theme="light"` / `data-theme="dark"`
   on <html>. Mode selection happens in the inline script above so
   the first paint is already in the right colour space.
   ------------------------------------------------------------------ */

:root {
  --bg-base:           #f5f5f7;
  --bg-elevated:       #ffffff;
  --bg-glass:          rgba(255, 255, 255, 0.72);
  --bg-overlay:        rgba(245, 245, 247, 0.85);

  --border-subtle:     rgba(0, 0, 0, 0.08);
  --border-card:       rgba(0, 0, 0, 0.04);

  --text-primary:      #1d1d1f;
  --text-secondary:    #6e6e73;
  --text-tertiary:     #86868b;

  --accent-blue:       #0071e3;
  --accent-blue-hover: #0077ed;
  --accent-red:        #ff3b30;
  --accent-green:      #34c759;
  --accent-amber:      #ff9f0a;

  --glow-bell:         0 0 60px rgba(0, 113, 227, 0.45);
  --shadow-card:       0 1px 3px rgba(0, 0, 0, 0.06),
                       0 8px 24px rgba(0, 0, 0, 0.05);
  --shadow-overlay:    0 30px 80px rgba(0, 0, 0, 0.25);

  --blur-backdrop:     20px;
  --blur-card:         14px;

  --radius-card:       14px;
  --radius-button:     10px;
  --radius-pill:       999px;

  --font-system:       -apple-system, BlinkMacSystemFont, "SF Pro Display",
                       "SF Pro Text", "Inter", system-ui, sans-serif;
}

[data-theme="dark"] {
  --bg-base:           #000000;
  --bg-elevated:       #1c1c1e;
  --bg-glass:          rgba(28, 28, 30, 0.72);
  --bg-overlay:        rgba(0, 0, 0, 0.85);

  --border-subtle:     rgba(255, 255, 255, 0.08);
  --border-card:       rgba(255, 255, 255, 0.06);

  --text-primary:      #f5f5f7;
  --text-secondary:    #98989d;
  --text-tertiary:     #6e6e73;

  --accent-blue:       #0a84ff;
  --accent-blue-hover: #409cff;
  --accent-red:        #ff453a;
  --accent-green:      #30d158;
  --accent-amber:      #ff9f0a;

  --glow-bell:         0 0 80px rgba(10, 132, 255, 0.55);
  --shadow-card:       0 1px 3px rgba(0, 0, 0, 0.4),
                       0 8px 24px rgba(0, 0, 0, 0.3);
  --shadow-overlay:    0 30px 80px rgba(0, 0, 0, 0.6);
}

html, body {
  background:   var(--bg-base);
  color:        var(--text-primary);
  font-family:  var(--font-system);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Theme-aware glass card. Use class="glass-card" in templates. */
.glass-card {
  background:             var(--bg-glass);
  -webkit-backdrop-filter: blur(var(--blur-card)) saturate(180%);
  backdrop-filter:         blur(var(--blur-card)) saturate(180%);
  border:                  1px solid var(--border-card);
  border-radius:           var(--radius-card);
  box-shadow:              var(--shadow-card);
}

.solid-card {
  background:    var(--bg-elevated);
  border:        1px solid var(--border-card);
  border-radius: var(--radius-card);
  box-shadow:    var(--shadow-card);
}

/* Theme toggle button shows the right icon per mode. */
.theme-toggle-btn {
  display:       inline-flex;
  align-items:   center;
  justify-content: center;
  width:         32px;
  height:        32px;
  border-radius: var(--radius-pill);
  color:         var(--text-secondary);
  transition:    color 150ms ease, background 150ms ease;
  cursor:        pointer;
  background:    transparent;
  border:        0;
}
.theme-toggle-btn:hover {
  color:      var(--text-primary);
  background: var(--border-subtle);
}
.theme-toggle-btn .icon-sun  { display: none; }
.theme-toggle-btn .icon-moon { display: inline-flex; }
[data-theme="dark"] .theme-toggle-btn .icon-sun  { display: inline-flex; }
[data-theme="dark"] .theme-toggle-btn .icon-moon { display: none; }

/* ------------------------------------------------------------------
   Bell overlay (Mieter klingelt).
   ------------------------------------------------------------------ */

.bell-backdrop {
  position:       fixed;
  inset:          0;
  z-index:        50;
  display:        flex;
  align-items:    center;
  justify-content: center;
  padding:        24px;
  background:     var(--bg-overlay);
  -webkit-backdrop-filter: blur(var(--blur-backdrop)) saturate(140%);
  backdrop-filter:         blur(var(--blur-backdrop)) saturate(140%);
  animation:      backdrop-fade-in 200ms ease both;
}
.bell-backdrop.is-leaving {
  animation: backdrop-fade-out 200ms ease both;
}

.bell-stage {
  position:    relative;
  width:       128px;
  height:      128px;
  margin:      0 auto 32px;
  animation:   bell-bounce-in 420ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@media (max-width: 640px) {
  .bell-stage {
    width:  96px;
    height: 96px;
  }
}

.bell-stage .pulse-ring {
  position:      absolute;
  inset:         0;
  border-radius: 50%;
  background:    radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
  opacity:       0.6;
  animation:     pulse-ring 1.6s ease-out infinite;
  animation-delay: 420ms;
}
.bell-stage .pulse-ring.delay-2 { animation-delay: 1.0s; }

.bell-stage .bell-icon-wrap {
  position:        absolute;
  inset:           0;
  display:         flex;
  align-items:     center;
  justify-content: center;
  color:           var(--accent-blue);
  filter:          drop-shadow(var(--glow-bell));
  animation:       bell-wobble 2.4s ease-in-out infinite;
  animation-delay: 420ms;
}
.bell-stage .bell-icon-wrap svg {
  width:  72%;
  height: 72%;
}

@keyframes bell-bounce-in {
  0%   { transform: scale(0.7); opacity: 0; }
  60%  { transform: scale(1.05); opacity: 1; }
  100% { transform: scale(1.0);  opacity: 1; }
}
@keyframes bell-wobble {
  0%, 78%, 100% { transform: rotate(0deg); }
  82%           { transform: rotate(-8deg); }
  88%           { transform: rotate(8deg); }
  94%           { transform: rotate(-4deg); }
}
@keyframes pulse-ring {
  0%   { transform: scale(0.9); opacity: 0.6; }
  100% { transform: scale(1.6); opacity: 0; }
}
@keyframes backdrop-fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes backdrop-fade-out {
  from { opacity: 1; }
  to   { opacity: 0; }
}

/* ------------------------------------------------------------------
   Apple-style pill buttons (used both inside the bell overlay and
   in admin forms).
   ------------------------------------------------------------------ */

.btn-pill {
  display:         inline-flex;
  align-items:     center;
  justify-content: center;
  gap:             8px;
  padding:         10px 22px;
  font-size:       15px;
  font-weight:     500;
  border-radius:   var(--radius-pill);
  transition:      background 150ms ease, color 150ms ease, transform 100ms ease;
  border:          0;
  cursor:          pointer;
  line-height:     1.2;
}
.btn-primary {
  background: var(--accent-blue);
  color:      #ffffff;
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-blue-hover);
}
.btn-primary:active:not(:disabled) {
  transform: scale(0.97);
}
.btn-secondary {
  background: var(--border-subtle);
  color:      var(--text-primary);
}
.btn-secondary:hover:not(:disabled) {
  background: var(--border-card);
}
.btn-pill:disabled {
  opacity: 0.45;
  cursor:  not-allowed;
}

/* ------------------------------------------------------------------
   Pills, status dots, badges.
   ------------------------------------------------------------------ */

.pill-badge {
  display:         inline-flex;
  align-items:     center;
  padding:         2px 8px;
  font-size:       11px;
  font-weight:     600;
  letter-spacing:  0.02em;
  border-radius:   var(--radius-pill);
  background:      var(--accent-blue);
  color:           #ffffff;
}

.unread-badge {
  position:        absolute;
  top:             -6px;
  right:           -8px;
  min-width:       18px;
  height:          18px;
  padding:         0 5px;
  font-size:       10px;
  font-weight:     600;
  border-radius:   var(--radius-pill);
  background:      var(--accent-blue);
  color:           #ffffff;
  display:         inline-flex;
  align-items:     center;
  justify-content: center;
}

.status-dot {
  display:       inline-block;
  width:         8px;
  height:        8px;
  border-radius: 50%;
  margin-right:  6px;
}
.status-dot.live    { background: var(--accent-green); }
.status-dot.warning { background: var(--accent-amber); }
.status-dot.offline { background: var(--text-tertiary); }

/* ------------------------------------------------------------------
   Typography helpers tuned to the Apple display scale.
   ------------------------------------------------------------------ */

.headline-xl { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; }
.headline-l  { font-size: 24px; font-weight: 600; letter-spacing: -0.015em; }
.headline-m  { font-size: 19px; font-weight: 600; }
.body-text   { font-size: 17px; font-weight: 400; }
.small-text  { font-size: 13px; font-weight: 400; }
.caption     { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-tertiary); }

/* Theme-aware focus ring for inputs. */
input, textarea, select {
  background:    var(--bg-elevated);
  color:         var(--text-primary);
  border:        1px solid var(--border-subtle);
  border-radius: var(--radius-button);
  padding:       8px 12px;
  font-family:   inherit;
  font-size:     15px;
  transition:    border-color 120ms ease, box-shadow 120ms ease;
}
input:focus, textarea:focus, select:focus {
  outline:       0;
  border-color:  var(--accent-blue);
  box-shadow:    0 0 0 3px color-mix(in srgb, var(--accent-blue) 25%, transparent);
}

/* Tables in admin pages. */
.app-table {
  width:         100%;
  font-size:     14px;
  border-collapse: separate;
  border-spacing: 0;
}
.app-table thead th {
  text-align:     left;
  font-size:      11px;
  font-weight:    600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color:          var(--text-tertiary);
  padding:        12px 16px;
  border-bottom:  1px solid var(--border-subtle);
  background:     transparent;
}
.app-table tbody td {
  padding:        14px 16px;
  border-bottom:  1px solid var(--border-card);
  color:          var(--text-primary);
}
.app-table tbody tr:hover td {
  background: var(--border-card);
}
.app-table tbody tr:last-child td {
  border-bottom: 0;
}
</style>
{{end}}
