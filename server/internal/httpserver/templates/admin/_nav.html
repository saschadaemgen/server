{{define "admin-nav"}}
<style>
  /* Saison 13-02-FIX4-a-HOTFIX4: dunkles Theme fuer Select-
     Dropdowns. Browser-default ist meist weiss, das bricht die
     Library-Aesthetik. Hier global (in jeder Admin-Seite via
     admin-nav-Partial eingebunden) ohne die Library-Files
     anzufassen. */
  select.input,
  select.field-select,
  .admin-shell select {
    background-color: var(--color-surface-1);
    color: var(--color-text);
    border: 1px solid var(--color-hairline-strong);
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, currentColor 50%),
                      linear-gradient(135deg, currentColor 50%, transparent 50%);
    background-position: calc(100% - 18px) 50%, calc(100% - 12px) 50%;
    background-size: 6px 6px;
    background-repeat: no-repeat;
    padding-right: 32px;
  }
  select.input option,
  select.field-select option,
  .admin-shell select option {
    background-color: var(--color-surface-1);
    color: var(--color-text);
  }
</style>
<nav class="admin-nav" aria-label="Hauptnavigation">
  <a class="admin-nav-brand" href="/a/">
    <span class="admin-nav-brand-mark" aria-hidden="true">u</span>
    <span>unifix</span>
  </a>
  <div class="admin-nav-links" role="navigation">
    <a class="admin-nav-link{{if eq .ActiveNav "dashboard"}} is-active{{end}}" href="/a/">Dashboard</a>
    <a class="admin-nav-link{{if eq .ActiveNav "web-viewers"}} is-active{{end}}" href="/a/web-viewers">Web-Viewer</a>
    <a class="admin-nav-link{{if eq .ActiveNav "esp-viewers"}} is-active{{end}}" href="/a/esp-viewers">ESP-Viewer</a>
    <a class="admin-nav-link{{if eq .ActiveNav "esp-pager"}} is-active{{end}}" href="/a/esp-pager">ESP-Pager</a>
    <a class="admin-nav-link{{if eq .ActiveNav "users"}} is-active{{end}}" href="/a/users">Benutzer</a>
    <a class="admin-nav-link{{if eq .ActiveNav "settings"}} is-active{{end}}" href="/a/settings">Einstellungen</a>
  </div>
  <div class="admin-nav-actions">
    <button class="btn-icon btn-ghost" aria-label="Theme umschalten" data-action="toggle-theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z"/>
      </svg>
    </button>
    <div class="admin-nav-user" tabindex="0" role="button" aria-label="Konto">
      <div class="admin-nav-user-avatar">{{.User.Initials}}</div>
      <span class="admin-nav-user-name">{{.User.Name}}</span>
    </div>
    <form method="post" action="/a/logout" style="margin:0;">
      <button class="btn-icon btn-ghost" type="submit" title="Abmelden" aria-label="Abmelden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 5H5v14h10"/>
          <path d="M15 9l4 3-4 3M9 12h10"/>
        </svg>
      </button>
    </form>
  </div>
</nav>
{{end}}
