{{define "content"}}
<div class="mb-8">
  <h1 class="headline-xl">Einstellungen</h1>
  <p class="small-text text-app-text-2 mt-1">UniFi Access Developer API Konfiguration.</p>
</div>

{{if .Flash}}
<div class="solid-card mb-6 px-4 py-3 small-text
            {{if eq .FlashType "green"}}text-app-green
            {{else if eq .FlashType "red"}}text-app-red
            {{else}}text-app-amber{{end}}">
  {{.Flash}}
</div>
{{end}}

<form method="POST" action="/a/settings" class="solid-card p-6 space-y-5 max-w-2xl">
  <div>
    <label class="block caption mb-1.5">Base URL</label>
    <input type="text" name="base_url" value="{{.BaseURL}}"
      placeholder="https://192.168.1.1:12445"
      class="w-full font-mono">
    <p class="small-text text-app-text-3 mt-1">UDM-URL inklusive Port (typisch 12445 direkt oder via Proxy ohne Port).</p>
  </div>

  <div>
    <label class="block caption mb-1.5">API Token</label>
    <input type="password" name="token" placeholder="{{if .TokenSet}}gespeichert (leer lassen um nicht zu aendern){{else}}aus UniFi Portal -> Access -> Settings -> Advanced -> API Token{{end}}"
      class="w-full font-mono">
    <p class="small-text text-app-text-3 mt-1">Wird verschluesselt in der Plattform-DB gespeichert. Nur Praefix wird im Log angezeigt.</p>
  </div>

  <div class="flex gap-3 pt-2">
    <button type="submit" name="action" value="save" class="btn-pill btn-primary">
      Speichern
    </button>
    <button type="submit" name="action" value="test" class="btn-pill btn-secondary">
      <span class="w-4 h-4">{{icon "link"}}</span> Speichern und Verbindung testen
    </button>
  </div>
</form>
{{end}}
