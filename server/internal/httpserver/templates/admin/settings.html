{{define "content"}}
<div class="mb-8">
  <h1 class="text-2xl font-semibold tracking-tight">Einstellungen</h1>
  <p class="text-sm text-zinc-400 mt-1">UniFi Access Developer API Konfiguration.</p>
</div>

{{if .Flash}}
<div class="mb-6 bg-{{.FlashType}}-950/50 border border-{{.FlashType}}-900 text-{{.FlashType}}-200 text-sm rounded px-4 py-3">
  {{.Flash}}
</div>
{{end}}

<form method="POST" action="/a/settings" class="bg-zinc-900 border border-zinc-800 rounded-lg p-6 space-y-5 max-w-2xl">
  <div>
    <label class="block text-xs uppercase tracking-wider text-zinc-400 mb-1.5">Base URL</label>
    <input type="text" name="base_url" value="{{.BaseURL}}"
      placeholder="https://192.168.1.1:12445"
      class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-zinc-100 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/40 focus:border-cyan-500/50">
    <p class="text-xs text-zinc-500 mt-1">UDM-URL inklusive Port (typisch 12445 direkt oder via Proxy ohne Port).</p>
  </div>

  <div>
    <label class="block text-xs uppercase tracking-wider text-zinc-400 mb-1.5">API Token</label>
    <input type="password" name="token" placeholder="{{if .TokenSet}}gespeichert (leer lassen um nicht zu aendern){{else}}aus UniFi Portal -> Access -> Settings -> Advanced -> API Token{{end}}"
      class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-zinc-100 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/40 focus:border-cyan-500/50">
    <p class="text-xs text-zinc-500 mt-1">Wird verschluesselt in der Plattform-DB gespeichert. Nur Praefix wird im Log angezeigt.</p>
  </div>

  <div class="flex gap-3 pt-2">
    <button type="submit" name="action" value="save"
      class="bg-cyan-500 hover:bg-cyan-400 text-zinc-950 font-medium rounded px-4 py-2 transition-colors inline-flex items-center gap-2">
      Speichern
    </button>
    <button type="submit" name="action" value="test"
      class="bg-zinc-800 hover:bg-zinc-700 text-zinc-100 font-medium rounded px-4 py-2 transition-colors inline-flex items-center gap-2">
      <span class="w-4 h-4">{{icon "link"}}</span> Speichern und Verbindung testen
    </button>
  </div>
</form>
{{end}}
