{{define "user_row"}}<tr id="user-{{.ID}}">
  <td>{{if .FullName}}{{.FullName}}{{else}}{{.FirstName}} {{.LastName}}{{end}}</td>
  <td class="text-secondary">{{.UserEmail}}</td>
  <td class="col-mac">{{.ID}}</td>
  <td>
    {{if eq .Status "ACTIVE"}}
    <span class="status-pill">aktiv</span>
    {{else}}
    <span class="status-pill offline">{{.Status}}</span>
    {{end}}
  </td>
  <td>
    <div class="row-actions">
      <button class="row-action destructive"
              hx-delete="/a/users/{{.ID}}"
              hx-target="#user-{{.ID}}" hx-swap="outerHTML"
              hx-confirm="Mieter {{.FirstName}} {{.LastName}} wirklich loeschen?">
        {{icon "trash"}}<span>Loeschen</span>
      </button>
    </div>
  </td>
</tr>{{end}}
