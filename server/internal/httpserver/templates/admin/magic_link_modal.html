{{define "magic_link_modal"}}<div id="modal-backdrop" class="modal-backdrop" onclick="this.remove()">
  <div class="modal-glass" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <h3 class="text-title-1">Login-Link fuer {{.MockName}}</h3>
        <p class="text-callout text-secondary mt-2">
          Gueltig 24 Stunden, einmalig verwendbar.
        </p>
      </div>
      <button type="button" class="modal-close"
              onclick="document.getElementById('modal-backdrop').remove()"
              aria-label="Schliessen">
        {{icon "x"}}
      </button>
    </div>

    <div class="link-display">{{.URL}}</div>

    <p class="text-caption text-tertiary">
      Mock-MAC: <span class="text-mono">{{.MockMAC}}</span>
    </p>

    <div class="modal-actions">
      <button type="button" class="btn btn-secondary"
              onclick="document.getElementById('modal-backdrop').remove()">
        Schliessen
      </button>
      <button type="button" id="copy-btn" class="btn btn-primary" onclick="copyMagicLink()">
        {{icon "clipboard"}}
        <span id="copy-label">In Zwischenablage kopieren</span>
      </button>
    </div>
  </div>
</div>

<script>
function copyMagicLink() {
  var box = document.querySelector('#modal-backdrop .link-display');
  if (!box) return;
  var text = box.textContent.trim();
  var label = document.getElementById('copy-label');
  var orig = label.textContent;
  function flash(msg) {
    label.textContent = msg;
    setTimeout(function() { label.textContent = orig; }, 1800);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      function() { flash('Kopiert.'); },
      function() { flash('Kopieren fehlgeschlagen'); }
    );
  } else {
    var r = document.createRange();
    r.selectNodeContents(box);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(r);
    try {
      document.execCommand('copy');
      flash('Kopiert.');
    } catch (_) {
      flash('Kopieren fehlgeschlagen');
    }
    sel.removeAllRanges();
  }
}
</script>
{{end}}
