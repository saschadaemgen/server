<!doctype html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>unifix · Dashboard</title>
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/components.css">
</head>
<body class="admin-shell">

  {{template "admin-dashboard.html" .}}
  {{template "modal-magic-link.html" .}}

  <script>
    (function () {
      var nodes = document.querySelectorAll('[data-modal], [data-sheet], [data-overlay], [data-sheet-scrim]');
      for (var i = 0; i < nodes.length; i++) nodes[i].classList.remove('is-open');
    })();
  </script>
  <script src="/static/interactions.js"></script>
</body>
</html>
