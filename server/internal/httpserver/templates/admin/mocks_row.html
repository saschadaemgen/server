{{define "mock_row"}}<tr id="mock-row-{{macID .MAC}}">
  <td class="col-mac">{{.MAC}}</td>
  <td>{{.Name}}</td>
  <td class="col-mac">{{.ServicePort}}</td>
  <td>
    {{if .Running}}
    <span class="status-pill">laeuft</span>
    {{else}}
    <span class="status-pill offline">aus</span>
    {{end}}
  </td>
  <td>
    <div class="row-actions">
      <button class="row-action"
              hx-post="/a/mocks/{{.MAC}}/magic-link"
              hx-target="#modal-slot" hx-swap="innerHTML">
        {{icon "link"}}<span>Login-Link</span>
      </button>
      <button class="row-action destructive"
              hx-delete="/a/mocks/{{.MAC}}"
              hx-target="#mock-row-{{macID .MAC}}" hx-swap="outerHTML"
              hx-confirm="Mock-Viewer {{.MAC}} wirklich loeschen?">
        {{icon "trash"}}<span>Loeschen</span>
      </button>
    </div>
  </td>
</tr>{{end}}
