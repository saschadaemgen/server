{{define "mock_row"}}<tr id="mock-row-{{macID .MAC}}">
  <td class="font-mono text-app-text-2" style="font-size: 12px;">{{.MAC}}</td>
  <td class="text-app-text">{{.Name}}</td>
  <td class="font-mono text-app-text-3" style="font-size: 12px;">{{.ServicePort}}</td>
  <td>
    {{if .Running}}
    <span class="inline-flex items-center small-text text-app-text">
      <span class="status-dot live"></span>laeuft
    </span>
    {{else}}
    <span class="inline-flex items-center small-text text-app-text-3">
      <span class="status-dot offline"></span>aus
    </span>
    {{end}}
  </td>
  <td class="text-right">
    <div class="flex items-center justify-end gap-3">
      <button hx-post="/a/mocks/{{.MAC}}/magic-link" hx-target="#modal-slot" hx-swap="innerHTML"
        class="small-text text-app-blue hover:text-app-blue-hover inline-flex items-center gap-1">
        <span class="w-4 h-4">{{icon "link"}}</span> Login-Link
      </button>
      <button hx-delete="/a/mocks/{{.MAC}}" hx-target="#mock-row-{{macID .MAC}}" hx-swap="outerHTML"
              hx-confirm="Mock-Viewer {{.MAC}} wirklich loeschen?"
              class="small-text text-app-text-3 hover:text-app-red inline-flex items-center gap-1">
        <span class="w-4 h-4">{{icon "trash"}}</span> Loeschen
      </button>
    </div>
  </td>
</tr>{{end}}
