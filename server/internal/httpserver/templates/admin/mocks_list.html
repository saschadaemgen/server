{{define "content"}}
<div class="flex items-center justify-between mb-8">
  <div>
    <h1 class="headline-xl">Mock-Viewer</h1>
    <p class="small-text text-app-text-2 mt-1">Virtuelle UA Intercom Viewer als Goroutines im Server.</p>
  </div>
</div>

<div class="solid-card p-5 mb-6">
  <h2 class="headline-m mb-4">Neuen Mock-Viewer anlegen</h2>
  <form hx-post="/a/mocks" hx-target="#mocks-tbody" hx-swap="beforeend"
        hx-on::after-request="if(event.detail.successful) this.reset()"
        class="grid grid-cols-1 md:grid-cols-[1fr,auto,auto] gap-3 items-end">
    <div>
      <label class="block caption mb-1.5">Name</label>
      <input type="text" name="name" required maxlength="64" placeholder="z.B. Familie Mueller 2OG"
        class="w-full">
    </div>
    <div>
      <label class="block caption mb-1.5">MAC (optional)</label>
      <input type="text" name="mac" placeholder="auto"
        pattern="^([0-9a-f]{2}:){5}[0-9a-f]{2}$"
        class="w-44 font-mono">
    </div>
    <button type="submit" class="btn-pill btn-primary">
      <span class="w-4 h-4">{{icon "plus"}}</span> Anlegen
    </button>
  </form>
  <div id="mock-add-error" class="mt-3"></div>
</div>

<div class="solid-card overflow-hidden">
  <table class="app-table">
    <thead>
      <tr>
        <th>MAC</th>
        <th>Name</th>
        <th>Port</th>
        <th>Status</th>
        <th class="text-right">Aktionen</th>
      </tr>
    </thead>
    <tbody id="mocks-tbody">
      {{if not .Mocks}}
      <tr id="mocks-empty">
        <td colspan="5" class="text-center text-app-text-3" style="padding: 40px 16px;">
          Noch keine Mock-Viewer angelegt. Form oben benutzen.
        </td>
      </tr>
      {{end}}
      {{range .Mocks}}{{template "mock_row" .}}{{end}}
    </tbody>
  </table>
</div>

<!-- htmx swaps the magic-link modal HTML into this slot. -->
<div id="modal-slot"></div>
{{end}}
