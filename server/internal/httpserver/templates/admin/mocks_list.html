{{define "content"}}
<div class="flex items-center justify-between mb-8">
  <div>
    <h1 class="text-2xl font-semibold tracking-tight">Mock-Viewer</h1>
    <p class="text-sm text-zinc-400 mt-1">Virtuelle UA Intercom Viewer als Goroutines im Server.</p>
  </div>
</div>

<div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5 mb-6">
  <h2 class="font-medium mb-4">Neuen Mock-Viewer anlegen</h2>
  <form hx-post="/a/mocks" hx-target="#mocks-tbody" hx-swap="beforeend"
        hx-on::after-request="if(event.detail.successful) this.reset()"
        class="grid grid-cols-1 md:grid-cols-[1fr,auto,auto] gap-3 items-end">
    <div>
      <label class="block text-xs uppercase tracking-wider text-zinc-400 mb-1.5">Name</label>
      <input type="text" name="name" required maxlength="64" placeholder="z.B. Familie Mueller 2OG"
        class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:ring-2 focus:ring-cyan-500/40 focus:border-cyan-500/50">
    </div>
    <div>
      <label class="block text-xs uppercase tracking-wider text-zinc-400 mb-1.5">MAC (optional)</label>
      <input type="text" name="mac" placeholder="auto"
        pattern="^([0-9a-f]{2}:){5}[0-9a-f]{2}$"
        class="w-44 bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm font-mono text-zinc-100 focus:outline-none focus:ring-2 focus:ring-cyan-500/40 focus:border-cyan-500/50">
    </div>
    <button type="submit"
      class="bg-cyan-500 hover:bg-cyan-400 text-zinc-950 font-medium rounded px-4 py-2 transition-colors inline-flex items-center gap-2">
      <span class="w-4 h-4">{{icon "plus"}}</span> Anlegen
    </button>
  </form>
  <div id="mock-add-error" class="mt-3"></div>
</div>

<div class="bg-zinc-900 border border-zinc-800 rounded-lg overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-zinc-950/50 text-xs uppercase tracking-wider text-zinc-400">
      <tr>
        <th class="text-left px-4 py-3 font-medium">MAC</th>
        <th class="text-left px-4 py-3 font-medium">Name</th>
        <th class="text-left px-4 py-3 font-medium">Port</th>
        <th class="text-left px-4 py-3 font-medium">Status</th>
        <th class="text-left px-4 py-3 font-medium">Mieter</th>
        <th class="text-right px-4 py-3 font-medium">Aktionen</th>
      </tr>
    </thead>
    <tbody id="mocks-tbody" class="divide-y divide-zinc-800">
      {{if not .Mocks}}
      <tr id="mocks-empty">
        <td colspan="6" class="text-center text-zinc-500 px-4 py-10 text-sm">
          Noch keine Mock-Viewer angelegt. Form oben benutzen.
        </td>
      </tr>
      {{end}}
      {{range .Mocks}}{{template "mock_row" .}}{{end}}
    </tbody>
  </table>
</div>

<!-- htmx swaps the magic-link modal HTML into this slot. -->
<div id="modal-slot"></div>
{{end}}
